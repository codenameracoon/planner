function renderDailySummary(){
  const el=document.getElementById('dailySummary');
  if(viewMode!=='day'){el.classList.add('u-hidden');return;}
  el.classList.remove('u-hidden');
  const vDay=dayIdx(currentDay);
  const db=blocks.filter(b=>b.day===vDay&&!b.ghost);
  const total=db.reduce((s,b)=>s+(b.endMin-b.startMin)/60,0);
  const done=db.filter(b=>b.completed).reduce((s,b)=>s+(b.endMin-b.startMin)/60,0);
  const bySubj={};
  db.forEach(b=>{const k=SUBJECTS[b.subject]?b.subject:'rest';bySubj[k]=(bySubj[k]||0)+(b.endMin-b.startMin)/60;});
  let html=`<span class="daily-summary-total">오늘 ${total.toFixed(1)}h (완료 ${done.toFixed(1)}h)</span>`;
  Object.keys(bySubj).forEach(k=>{const s=SUBJECTS[k];html+=`<span class="daily-summary-item"><span class="daily-sum-dot" style="background:${s.color}"></span>${s.short} ${bySubj[k].toFixed(1)}h</span>`;});
  el.innerHTML=html;
}

// ── monthly view ──────────────────────────────────────────────────────────────
function renderMonthView(){
  const wrap=document.getElementById('monthWrap');
  const today=new Date();today.setHours(0,0,0,0);
  const year=currentMonday.getFullYear(),month=currentMonday.getMonth();
  const firstDay=new Date(year,month,1);
  const gridStart=getMondayOf(firstDay);
  let html='<div class="month-grid">';
  DAYS.forEach(d=>html+=`<div class="month-hdr-cell">${d}</div>`);
  for(let i=0;i<42;i++){
    const cellDate=addDays(gridStart,i);
    const dk=dateKey(cellDate);
    const isToday=isSameDay(cellDate,today);
    const isOther=cellDate.getMonth()!==month;
    const db=loadBlocksForDate(cellDate).filter(b=>!b.ghost);
    const tH=db.reduce((s,b)=>s+(b.endMin-b.startMin)/60,0);
    const dH=db.filter(b=>b.completed).reduce((s,b)=>s+(b.endMin-b.startMin)/60,0);
    const rate=tH>0?Math.round(dH/tH*100):0;
    const subjKeys=[...new Set(db.map(b=>SUBJECTS[b.subject]?b.subject:'rest'))];
    const intensity=Math.min(tH/8,1);
    html+=`<div class="month-cell${isToday?' today-cell':''}${isOther?' other-month':''}" data-mdate="${dk}" style="background:rgba(35,131,226,${(intensity*0.07).toFixed(2)})">`+
      `<div class="month-cell-num">${cellDate.getDate()}</div>`+
      `<div class="month-dots">${subjKeys.slice(0,6).map(k=>`<span class="month-dot" style="background:${SUBJECTS[k].color}"></span>`).join('')}</div>`+
      (tH>0?`<div class="month-cell-info">${tH.toFixed(1)}h</div>`:'')+
      (rate>0?`<div class="month-cell-rate">${rate}%</div>`:'')+
    `</div>`;
  }
  html+='</div>';
  if(expandedMonthDay){
    const expDate=new Date(expandedMonthDay);
    const db=loadBlocksForDate(expDate).sort((a,b)=>a.startMin-b.startMin);
    html+=`<div class="month-expand">`+
      `<div class="month-expand-hdr">${expDate.getMonth()+1}월 ${expDate.getDate()}일 (${DAYS[dayIdx(expDate)]})<button class="month-expand-close" id="closeExpand">×</button></div>`;
    if(!db.length)html+='<div style="font-size:11px;color:#9B9A97">블록 없음</div>';
    else db.forEach(b=>{const s=SUBJECTS[b.subject]||SUBJECTS.rest;html+=`<div class="month-blk-item"><span class="month-blk-dot" style="background:${s.color}"></span><span class="month-blk-time">${fmtTime(b.startMin)}–${fmtTime(b.endMin)}</span><span class="month-blk-name">${s.name}${b.memo?' · '+escHtml(b.memo):''}</span><span class="month-blk-done">${b.completed?'✓':''}</span></div>`;});
    html+=`</div>`;
  }
  wrap.innerHTML=html;
  wrap.querySelectorAll('.month-cell').forEach(cell=>{
    cell.addEventListener('click',()=>{const dk=cell.dataset.mdate;expandedMonthDay=expandedMonthDay===dk?null:dk;renderMonthView();});
  });
  const closeBtn=document.getElementById('closeExpand');
  if(closeBtn)closeBtn.addEventListener('click',e=>{e.stopPropagation();expandedMonthDay=null;renderMonthView();});
  renderMonthlyRetro(wrap);
  renderToolbarProgress();
}

// ── drag helpers ──────────────────────────────────────────────────────────────
function findBlockEl(el){while(el){if(el.classList&&el.classList.contains('block'))return el;if(el.classList&&el.classList.contains('day-body'))return null;el=el.parentElement;}return null;}
function findDayBody(el){while(el){if(el.classList&&el.classList.contains('day-body'))return el;if(el.classList&&el.classList.contains('days-area'))return null;el=el.parentElement;}return null;}
function bodyY(body,clientY){return clientY-body.getBoundingClientRect().top;}
function dayBodyAt(cx){for(const b of document.querySelectorAll('.day-body')){const r=b.getBoundingClientRect();if(cx>=r.left&&cx<=r.right)return b;}return null;}
function getBlock(id){return blocks.find(b=>b.id===id);}
function startDrag(){document.addEventListener('mousemove',onMouseMove);document.addEventListener('mouseup',onMouseUp);document.body.style.userSelect='none';}
function endDrag(){document.removeEventListener('mousemove',onMouseMove);document.removeEventListener('mouseup',onMouseUp);document.body.style.userSelect='';}

// ── mouse events ──────────────────────────────────────────────────────────────
function onMouseDown(e){
  if(e.button!==0)return;hideCtx();hideSubjectPicker();

  // subject picker
  const subjPickId=e.target.dataset&&e.target.dataset.subjPick;
  if(subjPickId){e.stopPropagation();showSubjectPicker(subjPickId,e.target);return;}

  // focus mode button
  if(e.target.dataset&&e.target.dataset.focus){
    e.preventDefault();e.stopPropagation();
    const blk=getBlock(e.target.dataset.focus);if(!blk)return;
    const base=viewMode==='week'?currentMonday:getMondayOf(currentDay);
    currentDay=addDays(base,blk.day);
    viewMode='day';
    document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view==='day'));
    currentMonday=getMondayOf(currentDay);blocks=loadWeek(currentMonday);
    renderDailyView();
    return;
  }
  // completion button
  if(e.target.dataset&&e.target.dataset.done){
    e.preventDefault();e.stopPropagation();
    const blk=getBlock(e.target.dataset.done);
    if(blk){if(blk.ghost){confirmGhost(blk.id);return;}pushUndo();const cur=blk.status||(blk.completed?'done':'');blk.status=cur===''?'done':cur==='done'?'fail':'';blk.completed=(blk.status==='done');saveWeek();renderBlocks();}
    return;
  }
  // 90-min rest
  if(e.target.dataset&&e.target.dataset.addRest){e.preventDefault();e.stopPropagation();addRestBlock(e.target.dataset.addRest);return;}
  // inline memo
  const inlineId=e.target.dataset&&e.target.dataset.inlineEdit;
  if(inlineId){e.stopPropagation();activateInlineEdit(inlineId);return;}
  const noteId=e.target.dataset&&e.target.dataset.noteEdit;
  if(noteId){e.stopPropagation();activateNoteEdit(noteId);return;}
  // drag / resize / create — disabled on mobile (handled by touch events)
  if(isMobile())return;
  // resize
  const rdir=e.target.dataset&&e.target.dataset.rdir;
  const rid=e.target.dataset&&e.target.dataset.rid;
  if(rdir&&rid){e.preventDefault();e.stopPropagation();drag={type:'resize',id:rid,dir:rdir};startDrag();return;}
  // block select/move
  const blkEl=findBlockEl(e.target);
  if(blkEl){
    e.preventDefault();
    const id=blkEl.dataset.id;
    const blk=getBlock(id);
    if(blk&&blk.ghost){confirmGhost(id);return;}
    const now=Date.now();
    if(dblClickId===id&&now-dblClickTimer<400){dblClickTimer=0;dblClickId=null;openEditModal(id);return;}
    dblClickTimer=now;dblClickId=id;
    clearSelection();selectedIds.add(id);blkEl.classList.add('selected');
    if(!blk)return;
    const rect=blkEl.getBoundingClientRect();
    drag={type:'move',id:blk.id,offsetY:e.clientY-rect.top,duration:blk.endMin-blk.startMin};
    blkEl.style.opacity='.4';startDrag();return;
  }
  // empty area
  const body=findDayBody(e.target);
  if(body){
    e.preventDefault();clearSelection();
    const day=parseInt(body.dataset.day);
    const startMin=snapMin(clampMin(yToMin(bodyY(body,e.clientY))));
    drag={type:'create-or-select',day,startMin,body,ghost:null,startX:e.clientX,startY:e.clientY};
    startDrag();
  }
}

function onMouseMove(e){
  if(!drag)return;
  if(drag.type==='create-or-select'){
    const dx=Math.abs(e.clientX-drag.startX),dy=Math.abs(e.clientY-drag.startY);
    if(dx>15){drag.type='select';createSelRect(drag.startX,drag.startY);}
    else if(dy>6){
      drag.type='create';
      const subj=SUBJECTS[lastSubject]||SUBJECTS.labor_law;
      const ghost=document.createElement('div');ghost.className='ghost-block';ghost.style.top=minToY(drag.startMin)+'px';ghost.style.height='4px';
      drag.body.appendChild(ghost);drag.ghost=ghost;drag.endMin=drag.startMin+gran;
    }
    return;
  }
  if(drag.type==='select'){updateSelRect(drag.startX,drag.startY,e.clientX,e.clientY);hitTestSelection(drag.startX,drag.startY,e.clientX,e.clientY);return;}
  if(drag.type==='create'){
    drag.endMin=Math.max(clampMin(snapMin(yToMin(bodyY(drag.body,e.clientY)))),drag.startMin+gran);
    drag.ghost.style.height=Math.max(minToY(drag.endMin)-minToY(drag.startMin),4)+'px';return;
  }
  if(drag.type==='resize'){
    const blk=getBlock(drag.id);if(!blk)return;
    if(drag.dir==='s'){
      const body=document.querySelector(`.day-body[data-day="${blk.day}"]`);if(!body)return;
      blk.endMin=Math.max(clampMin(snapMin(yToMin(bodyY(body,e.clientY)))),blk.startMin+gran);
      const el=document.querySelector(`.block[data-id="${blk.id}"]`);
      if(el){el.style.height=Math.max((blk.endMin-blk.startMin)*ppm(),14)+'px';el.querySelector('.block-time-label').textContent=`${fmtTime(blk.startMin)}–${fmtTime(blk.endMin)}`;}
    } else if(drag.dir==='n'){
      const body=document.querySelector(`.day-body[data-day="${blk.day}"]`);if(!body)return;
      const ns=Math.min(clampMin(snapMin(yToMin(bodyY(body,e.clientY)))),blk.endMin-gran);blk.startMin=ns;
      const el=document.querySelector(`.block[data-id="${blk.id}"]`);
      if(el){el.style.top=minToY(blk.startMin)+'px';el.style.height=Math.max((blk.endMin-blk.startMin)*ppm(),14)+'px';el.querySelector('.block-time-label').textContent=`${fmtTime(blk.startMin)}–${fmtTime(blk.endMin)}`;}
    } else if(drag.dir==='w'||drag.dir==='e'){
      const tb=dayBodyAt(e.clientX);if(!tb)return;
      const nd=parseInt(tb.dataset.day);if(nd===blk.day)return;
      const el=document.querySelector(`.block[data-id="${blk.id}"]`);if(el){el.remove();tb.appendChild(el);}blk.day=nd;
    }
    return;
  }
  if(drag.type==='move'){
    const blk=getBlock(drag.id);if(!blk)return;
    const tb=dayBodyAt(e.clientX);if(!tb)return;
    const nd=parseInt(tb.dataset.day);
    let ns=snapMin(clampMin(yToMin(bodyY(tb,e.clientY)-drag.offsetY)));
    let ne=ns+drag.duration;if(ne>END_M){ne=END_M;ns=END_M-drag.duration;}
    blk.day=nd;blk.startMin=ns;blk.endMin=ne;
    const old=document.querySelector(`.block[data-id="${blk.id}"]`);if(old)old.remove();
    const subj=SUBJECTS[blk.subject]||SUBJECTS.rest;
    const h2=Math.max((blk.endMin-blk.startMin)*ppm(),14);
    const el=document.createElement('div');
    el.className='block'+(blk.completed?' completed':'')+(selectedIds.has(blk.id)?' selected':'');
    el.dataset.id=blk.id;
    el.style.cssText=`top:${minToY(blk.startMin)}px;height:${h2}px;border-left:3px solid ${subj.color};opacity:.55;`;
    el.innerHTML=`<div class="block-subject">${subj.name}</div>`+`<div class="block-content-row">`+(blk.memo?`<span class="block-memo-text" style="background:${hexToRgba(subj.color,0.12)}">${escHtml(blk.memo)}</span>`:'')+`</div>`+`<div class="block-time-label">${fmtTime(blk.startMin)}–${fmtTime(blk.endMin)}</div><div class="resize-s" data-rid="${blk.id}" data-rdir="s"></div>`;
    tb.appendChild(el);
  }
}

function onMouseUp(){
  if(!drag)return;
  if(drag.type==='create-or-select'){drag=null;endDrag();return;}
  if(drag.type==='select'){removeSelRect();drag=null;endDrag();return;}
  if(drag.type==='create'){
    drag.ghost.remove();
    if(drag.endMin-drag.startMin>=gran){pushUndo();blocks.push({id:uid(),day:drag.day,startMin:drag.startMin,endMin:drag.endMin,subject:lastSubject,memo:'',note:'',completed:false});saveWeek();}
  } else if(drag.type==='resize'||drag.type==='move'){pushUndo();saveWeek();}
  drag=null;endDrag();renderBlocks();
}

// ── context menu ──────────────────────────────────────────────────────────────
function onContextMenu(e){
  const blkEl=findBlockEl(e.target);if(!blkEl)return;
  e.preventDefault();e.stopPropagation();
  const blk=getBlock(blkEl.dataset.id);if(!blk)return;
  const menu=document.getElementById('ctxMenu');
  menu.innerHTML=
    (blk.ghost?`<button class="ctx-item" data-action="confirm" data-id="${blk.id}">복습 확정 (일반 블록으로)</button><div class="ctx-divider"></div>`:'')+
    (()=>{const st=blk.status||(blk.completed?'done':'');const lbl=st===''?'완료로 표시':st==='done'?'실패로 표시':'미완료로 표시';return`<button class="ctx-item" data-action="toggle" data-id="${blk.id}">${lbl}</button>`;})()+
    (!blk.ghost?`<button class="ctx-item" data-action="save-tmpl" data-id="${blk.id}">반복 템플릿으로 저장</button><button class="ctx-item" data-action="review" data-id="${blk.id}">복습 예약 (+3/+7/+14일)</button>`:'')+
    `<div class="ctx-divider"></div>`+
    `<button class="ctx-item danger" data-action="delete" data-id="${blk.id}">삭제</button>`;
  menu.style.display='block';menu.style.left=e.clientX+'px';menu.style.top=e.clientY+'px';
  requestAnimationFrame(()=>{const r=menu.getBoundingClientRect();if(r.right>window.innerWidth)menu.style.left=(e.clientX-r.width)+'px';if(r.bottom>window.innerHeight)menu.style.top=(e.clientY-r.height)+'px';});
  menu.onclick=ev=>{
    const btn=ev.target.closest('[data-action]');if(!btn)return;
    const id=btn.dataset.id;const b=getBlock(id);
    if(btn.dataset.action==='toggle'){if(b){pushUndo();const cur=b.status||(b.completed?'done':'');b.status=cur===''?'done':cur==='done'?'fail':'';b.completed=(b.status==='done');saveWeek();renderBlocks();}}
    else if(btn.dataset.action==='delete'){pushUndo();blocks=blocks.filter(x=>x.id!==id);selectedIds.delete(id);saveWeek();renderBlocks();}
    else if(btn.dataset.action==='save-tmpl'){if(b)saveAsTemplate(b);}
    else if(btn.dataset.action==='review'){if(b)scheduleReview(b);}
    else if(btn.dataset.action==='confirm'){confirmGhost(id);}
    hideCtx();
  };
}
function hideCtx(){document.getElementById('ctxMenu').style.display='none';}

function isTypingContext(){const el=document.activeElement;return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.contentEditable==='true');}

document.addEventListener('keydown',e=>{
  if(document.getElementById('modalOverlay').classList.contains('open')){if(e.key==='Escape')closeModal();return;}
  const meta=e.metaKey||e.ctrlKey;
  if(meta&&e.key==='c'&&selectedIds.size>0&&!isTypingContext()){e.preventDefault();clipboard=blocks.filter(b=>selectedIds.has(b.id)).map(b=>({...b}));return;}
  if(meta&&e.key==='v'&&clipboard.length>0&&!isTypingContext()){
    e.preventDefault();pushUndo();clearSelection();
    const nb=clipboard.map(b=>{
      const dur=b.endMin-b.startMin;const ns=Math.min(b.startMin+30,END_M-Math.max(dur,gran));const ne=Math.min(ns+dur,END_M);const id=uid();selectedIds.add(id);
      return{...b,id,startMin:ns,endMin:ne,completed:false};
    });
    blocks.push(...nb);saveWeek();renderBlocks();return;
  }
  if(meta&&e.key==='z'&&!e.shiftKey&&!isTypingContext()){e.preventDefault();undo();return;}
  if(meta&&(e.key==='y'||(e.key==='z'&&e.shiftKey))&&!isTypingContext()){e.preventDefault();redo();return;}
  if((e.key==='Escape'||e.key==='Delete')&&selectedIds.size>0&&!isTypingContext()){e.preventDefault();deleteSelected();return;}
  if(e.key==='Escape')hideCtx();
});

function makeStars(val,cb,cls='retro-star'){
  let html='<div class="retro-stars">';

  html+='</div>';

let touchState=null;
let longPressTimer=null;

function showMobileCtx(blockId,x,y){
  const blk=getBlock(blockId);if(!blk)return;
  const menu=document.getElementById('ctxMenu');
  menu.innerHTML=
    (()=>{const st=blk.status||(blk.completed?'done':'');const lbl=st===''?'완료로 표시':st==='done'?'실패로 표시':'미완료로 표시';return`<button class="ctx-item" data-action="toggle" data-id="${blk.id}">${lbl}</button>`;})()+
    `<button class="ctx-item" data-action="edit" data-id="${blk.id}">메모 편집</button>`+
    `<div class="ctx-divider"></div>`+
    `<button class="ctx-item danger" data-action="delete" data-id="${blk.id}">삭제</button>`;
  menu.style.display='block';
  menu.style.left=Math.min(x,window.innerWidth-190)+'px';
  menu.style.top=Math.min(y,window.innerHeight-140)+'px';
  menu.onclick=ev=>{
    const btn=ev.target.closest('[data-action]');if(!btn)return;
    const id=btn.dataset.id;const b=getBlock(id);
    if(btn.dataset.action==='toggle'){if(b){pushUndo();const cur=b.status||(b.completed?'done':'');b.status=cur===''?'done':cur==='done'?'fail':'';b.completed=(b.status==='done');saveWeek();renderBlocks();}}
    else if(btn.dataset.action==='edit'){openEditModal(id);}
    else if(btn.dataset.action==='delete'){if(b){pushUndo();blocks=blocks.filter(x=>x.id!==id);selectedIds.delete(id);saveWeek();renderBlocks();}}
    hideCtx();
  };
}

function onTouchStart(e){
  if(!isMobile())return;
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  const t=e.touches[0];
  const tx=t.clientX,ty=t.clientY;
  touchState={x:tx,y:ty,t:Date.now(),moved:false};
  // long press on a block (not on a button) → context menu
  const blkEl=findBlockEl(e.target);
  if(blkEl&&!e.target.closest('.block-done-btn')&&!e.target.closest('.block-focus-btn')){
    const id=blkEl.dataset.id;
    longPressTimer=setTimeout(()=>{
      longPressTimer=null;touchState=null;
      showMobileCtx(id,tx,ty);
    },500);
  }
}

function onTouchMove(e){
  if(!isMobile()||!touchState)return;
  const t=e.touches[0];
  const dx=t.clientX-touchState.x,dy=t.clientY-touchState.y;
  if(Math.abs(dx)>8||Math.abs(dy)>8){
    touchState.moved=true;
    if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  }
}

function onTouchEnd(e){
  if(!isMobile())return;
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  if(!touchState)return;
  const t=e.changedTouches[0];
  const dx=t.clientX-touchState.x;
  const dy=t.clientY-touchState.y;
  const dt=Date.now()-touchState.t;
  const moved=touchState.moved;
  touchState=null;

  // horizontal swipe → navigate day
  if(Math.abs(dx)>60&&Math.abs(dy)<80&&dt<600){
    if(viewMode==='day'){
      currentDay=addDays(currentDay,dx<0?1:-1);
      currentMonday=getMondayOf(currentDay);
      blocks=loadWeek(currentMonday);
      renderDailyView();
    }
    return;
  }

  // tap on block (not a button, not a swipe) → select
  if(!moved&&dt<400){
    const blkEl=findBlockEl(e.target);
    if(blkEl&&!e.target.closest('.block-done-btn')&&!e.target.closest('.block-focus-btn')){
      const id=blkEl.dataset.id;
      if(selectedIds.has(id)){clearSelection();}
      else{clearSelection();selectedIds.add(id);blkEl.classList.add('selected');}
    } else if(!blkEl){
      clearSelection();
    }
  }
}

// ── mobile touch resize ───────────────────────────────────────────────────────
let touchResizeState=null;

function onResizeHandleTouchStart(e){
  if(!isMobile())return;
  const handle=e.target.closest('[data-rdir]');
  if(!handle)return;
  const dir=handle.dataset.rdir;
  if(dir!=='s'&&dir!=='n')return;
  const id=handle.dataset.rid;
  const blk=getBlock(id);if(!blk)return;
  e.preventDefault();e.stopPropagation();
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  touchState=null;
  const ty=e.touches[0].clientY;
  touchResizeState={dir,id};
  document.addEventListener('touchmove',onResizeTouchMove,{passive:false});
  document.addEventListener('touchend',onResizeTouchEnd);
}

function onResizeTouchMove(e){
  if(!touchResizeState)return;
  e.preventDefault();
  const{dir,id}=touchResizeState;
  const blk=getBlock(id);if(!blk)return;
  const ty=e.touches[0].clientY;
  const body=document.querySelector(`.day-body[data-day="${blk.day}"]`);if(!body)return;
  const el=document.querySelector(`.block[data-id="${id}"]`);if(!el)return;
  if(dir==='s'){
    blk.endMin=Math.max(clampMin(snapMin(yToMin(bodyY(body,ty)))),blk.startMin+gran);
    el.style.height=Math.max((blk.endMin-blk.startMin)*ppm(),14)+'px';
    const lbl=el.querySelector('.block-time-label');if(lbl)lbl.textContent=`${fmtTime(blk.startMin)}–${fmtTime(blk.endMin)}`;
  } else {
    const ns=Math.min(clampMin(snapMin(yToMin(bodyY(body,ty)))),blk.endMin-gran);
    blk.startMin=ns;
    el.style.top=minToY(blk.startMin)+'px';
    el.style.height=Math.max((blk.endMin-blk.startMin)*ppm(),14)+'px';
    const lbl=el.querySelector('.block-time-label');if(lbl)lbl.textContent=`${fmtTime(blk.startMin)}–${fmtTime(blk.endMin)}`;
  }
}

function onResizeTouchEnd(){
  if(!touchResizeState)return;
  document.removeEventListener('touchmove',onResizeTouchMove);
  document.removeEventListener('touchend',onResizeTouchEnd);
  pushUndo();saveWeek();renderBlocks();
  touchResizeState=null;
}

function getCalendarEndForCycle(c){
  if(!c||!c.startDate)return null;
  const start=new Date(c.startDate);start.setHours(0,0,0,0);
  if(!c.weekdayOnly)return addDays(start,c.days);
  let d=new Date(start);let count=0;
  while(count<c.days){const dow=d.getDay();if(dow!==0&&dow!==6)count++;if(count<c.days)d=addDays(d,1);}
  return addDays(d,1);
}
function getCycleDayIn(c,date){
  if(!c||!c.startDate)return 0;
  const start=new Date(c.startDate);start.setHours(0,0,0,0);
  if(!c.weekdayOnly)return Math.max(0,Math.floor((date-start)/86400000));
  let d=new Date(date);d.setHours(0,0,0,0);
  while(d.getDay()===0||d.getDay()===6)d=addDays(d,-1);
  if(d<start)return 0;
  let count=0;let cur=new Date(start);
  while(cur<d){const dow=cur.getDay();if(dow!==0&&dow!==6)count++;cur=addDays(cur,1);}
  return count;
}
function getCycleDayCalDate(c,dayIndex){
  if(!c||!c.startDate)return null;
  const start=new Date(c.startDate);start.setHours(0,0,0,0);
  if(!c.weekdayOnly)return addDays(start,dayIndex);
  let d=new Date(start);let cnt=0;
  while(cnt<dayIndex){d=addDays(d,1);if(d.getDay()!==0&&d.getDay()!==6)cnt++;}
  return d;
}
function getCycleStatus(c,today){
  if(!c.startDate)return 'future';
  const start=new Date(c.startDate);start.setHours(0,0,0,0);
  const end=getCalendarEndForCycle(c);
  if(today>=end)return 'done';
  if(today>=start)return 'current';
  return 'future';
}

function getTodayBlockIndices(dayInCycle,blocksPerDay,numBlocks){
  if(!blocksPerDay||blocksPerDay<=0)return[];
  const s=Math.floor(dayInCycle*blocksPerDay);
  const e=Math.floor((dayInCycle+1)*blocksPerDay);
  const r=[];
  for(let i=s;i<Math.min(e,numBlocks);i++)r.push(i);
  return r;
}

    let detailHtml='';
    detailEntries.forEach(e=>{

    if(cur.startDate){const _tlS=new Date(cur.startDate);_tlS.setHours(0,0,0,0);const _tlE=addDays(getCalendarEndForCycle(cur),-1);const _pct=Math.min(99,Math.round((dayIn+0.5)/cur.days*100));html+=`<div class="review-timeline"><span class="review-tl-date">${fmtDate(_tlS)}</span><div class="review-tl-bar"><div class="review-tl-track" style="background:linear-gradient(to right,${subj.color} ${_pct}%,#E9E9E7 ${_pct}%)"></div><div class="review-tl-dot" style="left:${_pct}%;background:${subj.color}"></div></div><span class="review-tl-date">${fmtDate(_tlE)}</span></div>`;}

    }
    html+=`</div></div>`;

    // 오늘 체크 section (based on viewDate)
    const checks=loadReviewChecks(subj.key,vd);
    let todayItems=[];
    if(viewCur){
      if(viewCur.dailyPlan){
        viewCur.dailyPlan.filter(p=>p.day===viewDayIn).forEach(p=>{
          const blk=data.blocks[p.blockIdx];if(!blk)return;

      }else if(viewCur.blocksPerDay){
        getTodayBlockIndices(viewDayIn,viewCur.blocksPerDay,nb).forEach(bi=>{
          const blk=data.blocks[bi];if(!blk)return;
          todayItems.push({checkId:blk.id,blockId:blk.id,blockIdx:bi,name:blk.name});
        });
      }
    }
    // starred blocks float to top
    todayItems.sort((a,b)=>(weaks[b.blockId]?1:0)-(weaks[a.blockId]?1:0));

    // weekend rest check
    const isWeekendRest=!!(viewCur?.weekdayOnly&&(vd.getDay()===0||vd.getDay()===6));

    let checkTitle='오늘 체크';

    const _sbStyle=_sbAdded?'background:#9B9A97;color:#fff;border-color:#9B9A97;cursor:default':'';
    const _sbDateLabel=isTodayView?'오늘':`${vd.getMonth()+1}월${vd.getDate()}일`;
    const _sbLabel=_sbAdded?'✓ 추가됨':`+ ${_sbDateLabel} 시간표 추가`;
    const _sbHtml=!_sbIsWeekend?`<button class="review-tb-btn" id="addTodaySched_${subj.key}" ${_sbAdded?'disabled':''} style="${_sbStyle}">${_sbLabel}</button>`:'';

    html+=`<div class="review-section"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="review-section-title" style="margin-bottom:0;display:inline">${checkTitle}</span>${_sbHtml}</div><div class="review-today-list" id="rtl_${subj.key}">`;
    if(!todayItems.length){
      const emptyMsg=isWeekendRest?'주말 — 평일 기준 회독 중, 오늘은 휴식일입니다':isFutureView?'아직 체크할 수 없습니다':!viewCur?'이 날은 복습 없는 날입니다':'오늘은 복습 없는 날입니다';
      html+=`<div class="review-empty"${(isFutureView||isWeekendRest)?' style="color:#C0BFBC"':''}>${emptyMsg}</div>`;
    }else{
      todayItems.forEach(item=>{
        const done=!!checks[item.checkId];
        const isWeak=!!weaks[item.blockId];
        const prevMemo=loadReviewMemo(subj.key,item.blockId);
        const hourOpts=Array.from({length:14},(_,i)=>i+7).map(h=>`<option value="${h}"${h===9?' selected':''}>${h}:00</option>`).join('');

        html+=`<div class="review-today-item"${faded}>`;
        html+=`<div class="review-today-check${done?' done':''}" data-rck="${item.checkId}" data-bid="${item.blockId}" data-rsk="${subj.key}"${isFutureView?' style="pointer-events:none;opacity:.4"':''}>${done?'✓':'✗'}</div>`;
        html+=`<div class="review-item-body">`;
        html+=`<input class="review-today-name${done?' done-text':''}" data-rnm="${item.blockId}" data-rsk="${subj.key}" value="${escHtml(item.name)}"${isFutureView?' disabled':''}>`;

        html+=`<button class="review-tb-confirm" data-tbadd="${item.checkId}" data-rsk="${subj.key}" data-bname="${escHtml(item.name)}">추가</button>`;

        html+=`</div>`;

    html+=`</div></div>`;

    // speed analysis
    const doneCnt=cycles.filter(c=>getCycleStatus(c,today)==='done').length;
    const examDate=new Date('2026-08-31');examDate.setHours(0,0,0,0);
    const daysToExam=Math.round((examDate-today)/86400000);
    const completedDays=getCompletedDaysInCycle(subj.key,cur,data);
    const delayDays=dayIn-completedDays;
    const paceStr=delayDays>0?`+${delayDays}일 지연`:delayDays<0?`${-delayDays}일 앞당김`:'예정 준수';
    const doneCycles=cycles.filter(c=>getCycleStatus(c,today)==='done');
    const avgCycleDays=doneCycles.length?Math.round(doneCycles.reduce((s,c)=>s+(c.days||0),0)/doneCycles.length):(cur?cur.days:15);
    const totalCompletable=doneCnt+(cur?1:0)+Math.max(0,Math.floor(daysToExam/avgCycleDays));
    let addBpdStr='—';
    if(cur&&cur.blocksPerDay&&dayIn<cur.days-1){
      const blkDone=Math.round(completedDays*cur.blocksPerDay);

    html+=`<div class="review-section"><span class="review-section-title">속도 분석</span><div class="review-speed-box">`;

    html+=`<div class="review-speed-row"><span>시험까지</span><span>D-${daysToExam}</span></div>`;
    html+=`</div></div>`;
  }

  // roadmap
  html+=`<div class="review-section"><span class="review-section-title">전체 회독 로드맵</span><div class="review-roadmap">`;
  cycles.forEach(c=>{

    let circCls='',info='',editBtn='';

    else{info=c.startDate?`예정 · ${fmtDate(sDate)} 시작`:'예정 · 미설정';editBtn=`<button class="review-roadmap-edit" data-red="${c.num}" data-rsk="${subj.key}">편집</button>`;}
    const rowStyle=st==='current'?`style="background:${subj.color}15"`:'';

    html+=`<div class="review-roadmap-row${st==='current'?' current-cycle':''}" ${rowStyle}><div class="review-roadmap-circle ${circCls}">${circLabel}</div><span class="review-roadmap-name">${c.label||c.num+'회독'}</span><span class="review-roadmap-info">${info}</span>${editBtn}</div>`;
  });
  html+=`</div></div>`;
  el.innerHTML=html;

  // bind: rcex expand toggle
  const rcexBtn=el.querySelector(`#rcex_${subj.key}`);

  // bind: add-schedule button (any date)
  const _schedBtn=el.querySelector(`#addTodaySched_${subj.key}`);
  if(_schedBtn&&!_sbAdded)_schedBtn.addEventListener('click',()=>addTodaySchedule(_schedBtn,vd,subj.key+':'+_sbDk));

  // bind: check toggle (uses viewDate; disabled for future)
  el.querySelectorAll('[data-rck]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(isFutureView)return;
      const id=btn.dataset.rck,sk=btn.dataset.rsk,bid=btn.dataset.bid;
      const ch=loadReviewChecks(sk,vd);ch[id]=!ch[id];saveReviewChecks(sk,ch,vd);
      btn.classList.toggle('done',!!ch[id]);btn.textContent=ch[id]?'✓':'✗';
      const nm=el.querySelector(`[data-rnm="${bid}"]`);if(nm)nm.classList.toggle('done-text',!!ch[id]);
      if(ch[id]&&isTodayView){const d2=loadReviewData(sk);if(d2)tryAutoNextCycle(sk,d2);}
    });

  // bind: name edit
  el.querySelectorAll('[data-rnm]').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const id=inp.dataset.rnm,sk=inp.dataset.rsk;
      const d=loadReviewData(sk);if(!d)return;
      const b=d.blocks.find(x=>x.id===id);if(b){b.name=inp.value;saveReviewData(sk,d);}
    });
  });

  // bind: star toggle
  el.querySelectorAll('[data-star]').forEach(btn=>{
    btn.addEventListener('click',()=>{

      btn.classList.toggle('active',!!w[bid]);
      const item=btn.closest('.review-today-item');
      if(item){
        let badge=item.querySelector('.review-weak-badge');
        if(w[bid]&&!badge){

          const body=item.querySelector('.review-item-body');
          const refEl=body.querySelector('.review-prev-memo')||body.querySelector('.review-memo-area');
          body.insertBefore(badge,refEl||null);
        }else if(!w[bid]&&badge){badge.remove();}
      }
      showReviewToast(w[bid]?'약점 블록 태그됨':'약점 태그 해제');
    });
  });

  // bind: memo toggle
  el.querySelectorAll('[data-memo]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.memo;
      const area=document.getElementById('ma_'+id);
      if(area)area.classList.toggle('open');
    });

  // bind: memo save
  el.querySelectorAll('[data-msave]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.msave,sk=btn.dataset.rsk,bid=btn.dataset.bid;
      const ta=document.getElementById('mt_'+id);if(!ta)return;
      saveReviewMemo(sk,bid,ta.value.trim());
      document.getElementById('ma_'+id).classList.remove('open');
      const item=btn.closest('.review-today-item');
      if(item){
        let prev=item.querySelector('.review-prev-memo');
        const body=item.querySelector('.review-item-body');
        if(ta.value.trim()){
          if(!prev){prev=document.createElement('span');prev.className='review-prev-memo';body.insertBefore(prev,document.getElementById('ma_'+id));}
          prev.textContent=ta.value.trim();
        }else if(prev){prev.remove();}
      }
      showReviewToast('메모 저장됨');
    });

  // bind: time picker toggle
  el.querySelectorAll('[data-tb]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.tb;
      const picker=document.getElementById('tp_'+id);if(picker)picker.classList.toggle('open');

  // bind: time picker add
  el.querySelectorAll('[data-tbadd]').forEach(btn=>{

      const tbBtn=el.querySelector(`[data-tb="${id}"]`);
      if(tbBtn){tbBtn.classList.add('used');tbBtn.disabled=true;tbBtn.textContent='✓ 추가됨';}

  });

  // bind: roadmap edit buttons
  el.querySelectorAll('[data-red]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();

  // add cycle button
  const ab=document.createElement('button');ab.className='review-add-btn';ab.textContent='+ 회독 추가';
  ab.onclick=()=>addReviewCycle(subj.key);
  el.appendChild(ab);
}

function addReviewCycle(sk){
  const d=loadReviewData(sk)||{blocks:Array.from({length:8},(_,i)=>({id:'b'+(i+1),name:'블록 '+(i+1)})),cycles:[]};
  const next=(d.cycles.length?d.cycles[d.cycles.length-1].num:0)+1;
  d.cycles.push({num:next,days:7,blocksPerDay:1,startDate:null});
  saveReviewData(sk,d);renderReview();
}

function loadReviewWeaks(sk){try{return JSON.parse(localStorage.getItem('review_weak_'+sk)||'{}')}catch{return{}}}
function saveReviewWeaks(sk,d){const key='review_weak_'+sk;const v=JSON.stringify(d);localStorage.setItem(key,v);syncToSupabase(key,v);}
function loadReviewMemo(sk,blockId){try{return localStorage.getItem('review_memo_'+sk+'_'+blockId)||''}catch{return''}}
function saveReviewMemo(sk,blockId,text){const key='review_memo_'+sk+'_'+blockId;localStorage.setItem(key,text);syncToSupabase(key,text);}

function showReviewToast(msg){
  const t=document.getElementById('reviewToast');if(!t)return;
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._hide);t._hide=setTimeout(()=>t.style.opacity='0',2000);
}

function getCompletedDaysInCycle(sk,cur,data){
  if(!cur||!cur.startDate||!data)return 0;
  const s=new Date(cur.startDate);s.setHours(0,0,0,0);
  const today=new Date();today.setHours(0,0,0,0);
  const nb=data.blocks.length;
  let count=0,d=0;
  let calDate=new Date(s);
  while(d<cur.days){
    if(calDate>=today)break;
    const dow=calDate.getDay();
    if(!cur.weekdayOnly||dow!==0&&dow!==6){
      const ch=loadReviewChecks(sk,calDate);
      let ids=[];
      if(cur.dailyPlan){ids=cur.dailyPlan.filter(p=>p.day===d).map(()=>'dp_'+d);}
      else if(cur.blocksPerDay){ids=getTodayBlockIndices(d,cur.blocksPerDay,nb).map(i=>data.blocks[i]?.id).filter(Boolean);}
      if(ids.length&&ids.every(id=>ch[id]))count++;
      d++;
    }
    calDate=addDays(calDate,1);
  }
  return count;
}

function tryAutoNextCycle(sk,data){
  const today=new Date();today.setHours(0,0,0,0);
  const cur=data.cycles.find(c=>getCycleStatus(c,today)==='current');
  if(!cur)return;
  if(cur.weekdayOnly&&(today.getDay()===0||today.getDay()===6))return;
  const dayIn=getCycleDayIn(cur,today);
  if(dayIn!==cur.days-1)return;
  const checks=loadReviewChecks(sk);
  let todayIds=[];
  if(cur.dailyPlan){
    todayIds=cur.dailyPlan.filter(p=>p.day===dayIn).map(()=>'dp_'+dayIn);
  }else if(cur.blocksPerDay){
    todayIds=getTodayBlockIndices(dayIn,cur.blocksPerDay,data.blocks.length).map(i=>data.blocks[i].id);
  }
  if(!todayIds.length||!todayIds.every(id=>checks[id]))return;
  let next=data.cycles.find(c=>c.num===cur.num+1);
  if(!next){
    const newDays=Math.max(1,Math.round(cur.days*0.8));
    next={num:cur.num+1,days:newDays,blocksPerDay:cur.blocksPerDay||1,startDate:null};
    data.cycles.push(next);
  }
  if(next.startDate)return;
  const _calEnd=getCalendarEndForCycle(cur);
  next.startDate=dateKey(_calEnd||addDays(new Date(cur.startDate),cur.days));
  saveReviewData(sk,data);
  showReviewToast(`${cur.label||cur.num+'회독'} 완료!`);
  const banner=document.getElementById('reviewBanner');
  if(banner){
    const msg=banner.querySelector('.review-banner-msg');
    if(msg)msg.textContent=`${cur.label||cur.num+'회독'} 완료! ${next.label||next.num+'회독'}이 자동 설정되었습니다.`;
    const editBtn=document.getElementById('reviewBannerEdit');
    if(editBtn){editBtn.dataset.rsk=sk;editBtn.dataset.rnum=next.num;}
    banner.classList.add('open');
  }
}

function addBlockFromReview(sk,bname,hour,dur,targetDate){
  const td=targetDate?new Date(targetDate):new Date();td.setHours(0,0,0,0);
  const dk=dateKey(td);
  const tMon=getMondayOf(td);
  const tWKey=weekKey(tMon);
  const isCurrentWeek=weekKey(currentMonday)===tWKey;
  pushUndo();
  if(isCurrentWeek){
    blocks.push({id:uid(),day:dk,startMin:hour*60,endMin:hour*60+dur,subject:sk,memo:bname,note:'',completed:false});
    saveWeek();
  }else{
    const wb=loadWeek(tMon);
    wb.push({id:uid(),day:dk,startMin:hour*60,endMin:hour*60+dur,subject:sk,memo:bname,note:'',completed:false});
    const v=JSON.stringify(wb);localStorage.setItem(tWKey,v);syncToSupabase(tWKey,v);
  }
  showReviewToast('시간표에 추가됨!');
}

function getTodayMemoForSubject(sk){
  const data=loadReviewData(sk);if(!data)return'';
  const today=new Date();today.setHours(0,0,0,0);
  let cur=null,dayIn=0;
  (data.cycles||[]).forEach(c=>{
    if(getCycleStatus(c,today)==='current'&&!cur){
      cur=c;const s=new Date(c.startDate);s.setHours(0,0,0,0);
      dayIn=Math.floor((today-s)/86400000);
    }
  });
  if(!cur)return'';
  const cn=cur.label||(cur.num+'회독');
  const items=[];
  if(cur.dailyPlan){
    cur.dailyPlan.filter(p=>p.day===dayIn).forEach(p=>{
      const blk=data.blocks[p.blockIdx];if(!blk)return;
      items.push(cn+' '+(p.text||blk.name));
    });
  }else if(cur.blocksPerDay){
    getTodayBlockIndices(dayIn,cur.blocksPerDay,data.blocks.length).forEach(bi=>{
      const blk=data.blocks[bi];if(!blk)return;
      items.push(cn+' '+blk.name);
    });
  }
  return items.join(' / ');
}

function addTodaySchedule(btn,targetDate,stateKey){

  const tgt=targetDate?new Date(targetDate):realToday;tgt.setHours(0,0,0,0);

  if(dow===0||dow===6){alert('주말에는 시간표를 추가할 수 없습니다.');return;}

  const todayDi=dayIdx(tgt);
  const todayMon=getMondayOf(tgt);
  const todayWKey=weekKey(todayMon);
  const isCurrentWeek=weekKey(currentMonday)===todayWKey;
  let todayBlocks=isCurrentWeek?[...blocks]:loadWeek(todayMon);

  const m={
    labor_law: getTodayMemoForSubject('labor_law')||'노동법',
    admin_law: getTodayMemoForSubject('admin_law')||'행정쟁송법',
    hr_mgmt:   getTodayMemoForSubject('hr_mgmt')||'인사노무관리',
    labor_econ:getTodayMemoForSubject('labor_econ')||'노동경제학',
  };

  const studySlots=[
    {subject:'labor_law', startMin:480, endMin:660, memo:m.labor_law},
    {subject:'admin_law', startMin:660, endMin:720, memo:m.admin_law},
    {subject:'admin_law', startMin:780, endMin:900, memo:m.admin_law},
    {subject:'hr_mgmt',   startMin:900, endMin:1080,memo:m.hr_mgmt},
    {subject:'labor_econ',startMin:1200,endMin:1380,memo:m.labor_econ},
  ];
  const restSlots=[
    {subject:'rest',startMin:720,endMin:780,memo:'점심'},
    {subject:'rest',startMin:1080,endMin:1140,memo:'저녁'},
    {subject:'rest',startMin:1140,endMin:1200,memo:'율무 산책'},
  ];

  const hasConflict=studySlots.some(slot=>
    todayBlocks.some(b=>b.day===todayDi&&!b.ghost&&b.startMin<slot.endMin&&b.endMin>slot.startMin)
  );

  if(hasConflict){
    if(!confirm('이미 해당 시간에 블록이 있습니다. 덮어쓸까요?'))return;
    const toRemove=new Set();
    studySlots.forEach(slot=>{
      todayBlocks.forEach(b=>{
        if(b.day===todayDi&&!b.ghost&&b.startMin<slot.endMin&&b.endMin>slot.startMin)toRemove.add(b.id);
      });
    });
    todayBlocks=todayBlocks.filter(b=>!toRemove.has(b.id));
  }

  pushUndo();
  studySlots.forEach(slot=>{
    todayBlocks.push({id:uid(),day:todayDi,startMin:slot.startMin,endMin:slot.endMin,subject:slot.subject,memo:slot.memo,note:'',completed:false});
  });
  restSlots.forEach(slot=>{
    const exists=todayBlocks.some(b=>b.day===todayDi&&!b.ghost&&b.startMin<slot.endMin&&b.endMin>slot.startMin);
    if(!exists)todayBlocks.push({id:uid(),day:todayDi,startMin:slot.startMin,endMin:slot.endMin,subject:slot.subject,memo:slot.memo,note:'',completed:false});
  });

  if(isCurrentWeek){blocks=todayBlocks;saveWeek();}
  else{const v=JSON.stringify(todayBlocks);localStorage.setItem(todayWKey,v);syncToSupabase(todayWKey,v);}

  if(stateKey)_schedAddedDates[stateKey]=true;
  btn.textContent='✓ 추가됨';
  btn.style.cssText+='background:#9B9A97;color:#fff;border-color:#9B9A97;cursor:default;';
  btn.disabled=true;
  const isToday=isSameDay(tgt,realToday);
  showReviewToast(isToday?'오늘 시간표에 추가됨!':`${tgt.getMonth()+1}월${tgt.getDate()}일 시간표에 추가됨!`);
}

function addSingleSubjectSchedule(btn,subjKey,targetDate,stateKey){
  const SLOTS={
    labor_law:[{startMin:480,endMin:660}],
    admin_law:[{startMin:660,endMin:720},{startMin:780,endMin:900}],
    hr_mgmt:[{startMin:900,endMin:1080}],
    labor_econ:[{startMin:1200,endMin:1380}],
  };
  const slots=SLOTS[subjKey];if(!slots)return;
  const realToday=new Date();realToday.setHours(0,0,0,0);
  const tgt=targetDate?new Date(targetDate):realToday;tgt.setHours(0,0,0,0);
  if(tgt.getDay()===0||tgt.getDay()===6){alert('주말에는 시간표를 추가할 수 없습니다.');return;}
  const todayDi=dayIdx(tgt);
  const todayMon=getMondayOf(tgt);
  const todayWKey=weekKey(todayMon);
  const isCurrentWeek=weekKey(currentMonday)===todayWKey;
  let todayBlocks=isCurrentWeek?[...blocks]:loadWeek(todayMon);
  const memo=getTodayMemoForSubject(subjKey)||SUBJECTS[subjKey]?.name||subjKey;
  const hasConflict=slots.some(slot=>todayBlocks.some(b=>b.day===todayDi&&!b.ghost&&b.startMin<slot.endMin&&b.endMin>slot.startMin));
  if(hasConflict){
    if(!confirm('이미 해당 시간에 블록이 있습니다. 덮어쓸까요?'))return;
    const toRemove=new Set();
    slots.forEach(slot=>{todayBlocks.forEach(b=>{if(b.day===todayDi&&!b.ghost&&b.startMin<slot.endMin&&b.endMin>slot.startMin)toRemove.add(b.id);});});
    todayBlocks=todayBlocks.filter(b=>!toRemove.has(b.id));
  }
  pushUndo();
  slots.forEach(slot=>{todayBlocks.push({id:uid(),day:todayDi,startMin:slot.startMin,endMin:slot.endMin,subject:subjKey,memo,note:'',completed:false});});
  if(isCurrentWeek){blocks=todayBlocks;saveWeek();}
  else{const v=JSON.stringify(todayBlocks);localStorage.setItem(todayWKey,v);syncToSupabase(todayWKey,v);}
  if(stateKey)_schedAddedDates[stateKey]=true;
  btn.textContent='✓ 추가됨';btn.classList.add('used');
  btn.style.cssText+='color:#81C995;border-color:#81C995;cursor:default;';
  btn.disabled=true;
  const isToday=isSameDay(tgt,realToday);
  showReviewToast((isToday?'오늘 ':`${tgt.getMonth()+1}월${tgt.getDate()}일 `)+(SUBJECTS[subjKey]?.short||subjKey)+' 시간표 추가됨!');
}
