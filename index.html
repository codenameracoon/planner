<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노무사 플래너</title>
<meta name="theme-color" content="#F28B82">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="플래너">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#37352F;font-size:15px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid #E9E9E7;flex-shrink:0;background:#fff;z-index:20;flex-wrap:wrap}
.toolbar-brand{font-size:16px;font-weight:600;margin-right:4px}
.sep{width:1px;height:18px;background:#E9E9E7;flex-shrink:0}
.nav-row{display:flex;align-items:center;gap:4px}
.week-label{font-size:15px;font-weight:500;min-width:140px;text-align:center}
.btn{background:none;border:1px solid #E9E9E7;border-radius:4px;padding:4px 10px;font-family:inherit;font-size:16px;cursor:pointer;color:#37352F;white-space:nowrap;transition:background .1s;line-height:1.4}
.btn:hover{background:#F7F7F5}
.btn-nav{padding:4px 8px;font-size:16px;line-height:1}
.btn-icon{padding:4px 7px;line-height:1;position:relative}
.btn-icon::after{content:attr(data-tooltip);position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#fff;color:#9B9A97;border:1px solid #E9E9E7;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:12px;font-weight:400;white-space:nowrap;padding:3px 8px;border-radius:4px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:100}
.btn-icon:hover::after{opacity:1}
.seg-group{display:flex;border:1px solid #E9E9E7;border-radius:4px;overflow:hidden}
.seg-btn{background:none;border:none;border-right:1px solid #E9E9E7;padding:4px 9px;font-family:inherit;font-size:16px;cursor:pointer;color:#37352F;transition:background .1s;line-height:1.4}
.seg-btn:last-child{border-right:none}
.seg-btn.active{background:#F1F1EF;font-weight:600}
.seg-btn:hover:not(.active){background:#F7F7F5}
.dday{font-size:14px;font-weight:600;color:#C0392B;padding:3px 9px;border:1px solid #FADBD8;border-radius:4px;background:#FEF9F9;white-space:nowrap;flex-shrink:0;letter-spacing:.01em;margin-left:auto}
.tb-progress{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tb-prog-bar{width:64px;height:4px;background:#E0E0E0;border-radius:2px;overflow:hidden;flex-shrink:0;display:flex}
.tb-prog-label{font-size:12px;color:#9B9A97;white-space:nowrap}

/* planner wrapper */
.planner-wrapper{flex:1;overflow:auto;position:relative;min-height:0}
.planner-grid{display:flex;position:relative}

/* time axis */
.time-col{width:52px;flex-shrink:0;position:sticky;left:0;background:#fff;z-index:10;border-right:1px solid #E9E9E7}
.time-header-spacer{height:36px;border-bottom:1px solid #E9E9E7;display:flex;align-items:center;justify-content:center}
.goal-collapse-btn{background:none;border:1px solid #E9E9E7;border-radius:3px;cursor:pointer;font-size:10px;padding:2px 5px;color:#9B9A97;line-height:1;transition:background .1s,color .1s;flex-shrink:0}
.goal-collapse-btn:hover{background:#F7F7F5;color:#37352F}
.time-labels-wrap{position:relative}
.time-label{position:absolute;right:7px;font-size:15px;font-weight:600;color:#37352F;white-space:nowrap;transform:translateY(-50%);pointer-events:none;user-select:none}

/* days */
.days-area{flex:1;display:flex;min-width:0}
.day-col{flex:1;min-width:80px;border-right:1px solid #E9E9E7;display:flex;flex-direction:column}
.day-col:last-child{border-right:none}
.day-header{height:36px;display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:0 6px;position:sticky;top:0;background:#fff;border-bottom:1px solid #E9E9E7;z-index:5;flex-shrink:0}
.day-name{font-size:12px;font-weight:700;color:#37352F;text-transform:uppercase;letter-spacing:.04em}
.day-date{font-size:13px;font-weight:600;color:#37352F}
.day-col.today .day-name,.day-col.today .day-date{color:#2383E2}
.day-col.today .day-header{background:#F5F9FF}
.day-routine-row{display:flex;gap:3px;align-items:center;flex-shrink:0}
.routine-hdr-btn{height:20px;border:1.5px solid #E0E0E0;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px;background:transparent;padding:1px 3px;transition:background .1s,border-color .1s;line-height:1;flex-shrink:0;opacity:0.45;min-width:20px}
.routine-hdr-btn.done{border-color:#81C995;background:rgba(129,201,149,.18);opacity:1}
.day-body{position:relative;flex-shrink:0;user-select:none;cursor:crosshair}

/* grid */
.grid-line{position:absolute;left:0;right:0;pointer-events:none;z-index:0}
.grid-hour{border-top:1px solid #E9E9E7}
.grid-sub{border-top:1px solid #F4F4F2}
.tint{position:absolute;left:0;right:0;pointer-events:none;z-index:0}
.tint-morning{background:rgba(255,200,60,.04)}
.tint-afternoon{background:rgba(80,140,255,.04)}
.tint-evening{background:rgba(120,120,120,.04)}

/* blocks */
.block{position:absolute;left:3px;right:3px;border-radius:4px;padding:4px 22px 18px 8px;font-size:11px;cursor:grab;overflow:hidden;z-index:3;background:#fff;border:1px solid #E9E9E7;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.block:active{cursor:grabbing}
.block.completed{opacity:.4}
.block.ghost-sr{border-style:dashed!important;border-width:2px!important;opacity:.55}
.block-done-btn{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;border:1.5px solid #C0BFBC;background:transparent;font-size:8px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .1s,background .1s,border-color .1s;z-index:5;color:#9B9A97;font-family:inherit;padding:0;line-height:1}
.block-done-btn:hover{opacity:1}
.block.completed .block-done-btn{background:rgba(52,168,83,.9);border-color:rgba(52,168,83,.9);color:#fff;opacity:1}
.block.failed{opacity:.4}
.block.failed .block-done-btn{background:rgba(234,67,53,.9);border-color:rgba(234,67,53,.9);color:#fff;opacity:1}
.block-fail-badge{display:inline-flex;align-items:center;justify-content:center;width:11px;height:11px;background:rgba(234,67,53,.85);border-radius:2px;color:#fff;font-size:7px;font-weight:700;margin-right:3px;vertical-align:middle;flex-shrink:0}
.block-subject{font-size:12px;font-weight:500;color:#9B9A97;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.block-review-label{font-size:11px;font-style:italic;color:#9B9A97;margin-top:1px}
.block-content-row{display:flex;align-items:flex-start;gap:4px;margin-top:7px}
.block-icon{flex-shrink:0;display:flex;align-items:center;opacity:.9;margin-top:4px}
.block-subj-name{cursor:pointer;border-radius:3px;padding:0 2px;margin:0 -2px;transition:background .1s}
.block-subj-name:hover{background:rgba(0,0,0,.07)}
.block-memo-text{display:block;font-size:13px;font-weight:600;color:#37352F;border-radius:6px;background:#fff;border:0.5px solid #E9E9E7;padding:4px 8px;word-break:break-word;white-space:pre-wrap;overflow-y:auto;max-height:clamp(24px,calc(var(--block-h,80px) - 52px),300px);min-height:24px;min-width:0;flex:1;cursor:text}
.block-memo-text[contenteditable="true"]{outline:none}
.block-note{display:block;font-size:13px;color:#37352F;margin-top:2px;word-break:break-word;white-space:pre-wrap;overflow-y:auto;max-height:clamp(20px,calc(var(--block-h,80px) - 52px),200px);min-height:0;background:#fff;border:0.5px solid #E9E9E7;border-radius:6px;padding:4px 8px;cursor:text}
.block-note.empty{font-style:italic;opacity:.35;color:#9B9A97}
.block-note[contenteditable="true"]{outline:none}
.u-hidden{display:none!important}
.block-time-label{font-size:10px;font-weight:400;color:#9B9A97;margin-top:2px;white-space:nowrap}
.block-warn{font-size:9px;margin-top:2px;color:#9B9A97;white-space:nowrap;overflow:hidden;display:flex;align-items:center;gap:3px}
.warn-btn{background:rgba(0,0,0,.07);border:none;border-radius:3px;font-family:inherit;font-size:9px;color:#37352F;cursor:pointer;padding:1px 5px;white-space:nowrap;transition:background .1s}
.warn-btn:hover{background:rgba(0,0,0,.14)}
.resize-n{position:absolute;top:0;left:6px;right:6px;height:7px;cursor:n-resize;z-index:4;opacity:0;transition:opacity .15s}
.resize-s{position:absolute;bottom:0;left:0;right:0;height:10px;cursor:s-resize;z-index:4;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.resize-s::after{content:'';width:20px;height:2px;border-radius:1px;background:rgba(0,0,0,.25)}
.resize-w{position:absolute;left:0;top:7px;bottom:10px;width:6px;cursor:w-resize;z-index:4;opacity:0;transition:opacity .15s}
.resize-e{position:absolute;right:0;top:7px;bottom:10px;width:6px;cursor:e-resize;z-index:4;opacity:0;transition:opacity .15s}
.block:hover .resize-n,.block:hover .resize-s,.block:hover .resize-w,.block:hover .resize-e{opacity:1}

/* selection & ghost drag */
.block.selected{outline:2px solid #2383E2;outline-offset:-2px;z-index:4}
.sel-rect{position:fixed;border:1.5px dashed #2383E2;background:rgba(35,131,226,.06);pointer-events:none;z-index:50;border-radius:2px}
.ghost-block{position:absolute;left:3px;right:3px;border-radius:4px;pointer-events:none;z-index:5;border:2px dashed #2383E2;background:rgba(35,131,226,.07);opacity:.9}
.grid-hover-cell{position:absolute;left:0;right:0;pointer-events:none;z-index:1;background:rgba(35,131,226,.05);display:none;border-top:1px dashed rgba(35,131,226,.25)}

/* time indicator */
.time-now-line{position:absolute;left:0;right:0;height:2px;background:#F28B82;pointer-events:none;z-index:6}
.time-now-dot{position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#F28B82}
.time-now-lbl{color:#F28B82!important;font-weight:600!important}

/* context menu */
.ctx-menu{position:fixed;background:#fff;border:1px solid #E9E9E7;border-radius:6px;padding:4px;z-index:999;min-width:176px;box-shadow:0 2px 12px rgba(0,0,0,.1);display:none}
.ctx-item{display:block;width:100%;padding:6px 10px;text-align:left;background:none;border:none;border-radius:3px;font-family:inherit;font-size:15px;color:#37352F;cursor:pointer;white-space:nowrap}
.ctx-item:hover{background:#F7F7F5}
.ctx-item.danger{color:#E03E3E}
.ctx-divider{height:1px;background:#E9E9E7;margin:4px 0}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:600;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border:1px solid #E9E9E7;border-radius:6px;padding:20px;min-width:300px;max-width:380px;width:100%}
.modal-box h3{font-size:16px;font-weight:600;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:#9B9A97;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.field select,.field textarea{width:100%;padding:6px 8px;border:1px solid #E9E9E7;border-radius:4px;font-family:inherit;font-size:15px;color:#37352F;background:#fff;outline:none;transition:border-color .1s}
.field select:focus,.field textarea:focus{border-color:#8AB4F8}
.field textarea{resize:vertical;min-height:64px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.btn-primary{background:#37352F;color:#fff;border:1px solid #37352F;border-radius:4px;padding:5px 14px;font-family:inherit;font-size:15px;cursor:pointer;transition:background .1s}
.btn-primary:hover{background:#1a1a17;border-color:#1a1a17}

/* stats strip */
.stats-strip{flex-shrink:0;border-bottom:2px solid #E9E9E7;background:#FAFAFA}
.stats-strip-head{display:flex;align-items:center;gap:10px;padding:5px 14px;border-bottom:1px solid #E9E9E7;flex-wrap:wrap}
.stats-strip-title{font-size:12px;font-weight:600;color:#9B9A97;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
#statsHoursBadge{display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap}
.stats-hours-badge-item{font-size:13px;font-weight:600;color:#37352F;white-space:nowrap}
.stats-hours-badge-label{font-size:11px;color:#9B9A97;font-weight:400}
body.dark #statsHoursBadge .stats-hours-badge-item{color:#E8E8E6}
.stats-hours-grid2{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px}
.stats-h2-cell{display:flex;align-items:center;gap:4px;min-width:0}
.stats-h2-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.stats-h2-val{font-size:11px;font-weight:600;white-space:nowrap;color:#37352F}
body.dark .stats-h2-val{color:#E8E8E6}
.stats-tab-group{display:flex;border:1px solid #E9E9E7;border-radius:4px;overflow:hidden}
.stats-tab{background:none;border:none;border-right:1px solid #E9E9E7;padding:2px 8px;font-family:inherit;font-size:13px;cursor:pointer;color:#9B9A97;transition:background .1s;line-height:1.6}
.stats-tab:last-child{border-right:none}
.stats-tab.active{background:#F1F1EF;color:#37352F;font-weight:600}
.stats-total-row{font-size:14px;font-weight:600;color:#37352F;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #F1F1EF}
.stats-subject-row{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px}
.stats-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;margin-top:2px}
.stats-name{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stats-hours{font-size:15px;white-space:nowrap;min-width:32px}
.stats-pct{font-size:14px;color:#9B9A97;white-space:nowrap;min-width:28px}
.stats-goal-wrap{flex:1;min-width:0}
.stats-goal-line{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.stats-goal-input{font-size:13px;font-family:inherit;border:none;border-bottom:1px dashed #E9E9E7;width:30px;text-align:center;outline:none;background:transparent;color:#37352F;cursor:pointer}
.stats-goal-input:focus{border-bottom-color:#8AB4F8;cursor:text}
.stats-goal-text{font-size:12px;color:#9B9A97;white-space:nowrap}
.stats-progress-bar{height:3px;background:#F1F1EF;border-radius:2px;margin-top:3px}
.stats-progress-fill{height:3px;border-radius:2px}

/* stats layout — order: goals | hours */
.stats-body{display:flex;gap:0;padding:6px 14px 10px;align-items:flex-start;justify-content:space-between}
.stats-col-goals{flex:1;min-width:0;padding-right:24px}
.stats-col-hours{flex:0 0 auto;padding-left:20px;border-left:1px solid #E9E9E7}
.stats-hours-inner{display:flex;align-items:flex-start;gap:16px}
.stats-completion-frac{display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding-left:14px;border-left:1px solid #F1F1EF;flex-shrink:0}
.stats-completion-row{display:flex;align-items:baseline;gap:4px}
.stats-completion-val{font-size:16px;font-weight:700}
.stats-completion-lbl{font-size:12px;color:#9B9A97}
.stats-completion-div{width:100%;height:1px;background:#E9E9E7;margin:2px 0}
.stats-hours-grid{display:grid;grid-template-columns:auto auto;gap:2px 10px;justify-content:start}
.stats-col-label{font-size:12px;font-weight:600;color:#9B9A97;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.wgoal-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.wgoal-row{display:flex;align-items:center;gap:6px}
.wgoal-check{width:14px;height:14px;border:1.5px solid #C0BFBC;border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:transparent;transition:background .1s,border-color .1s}
.wgoal-check.done{background:#37352F;border-color:#37352F;color:#fff}
.wgoal-text-input{flex:1;font-size:14px;font-family:inherit;border:none;border-bottom:1px dashed #E9E9E7;outline:none;background:transparent;color:#37352F;cursor:pointer;min-width:0;padding:1px 0}
.wgoal-text-input:focus{border-bottom-color:#8AB4F8;cursor:text}
.wgoal-text-input.done-text{text-decoration:line-through;color:#9B9A97}

/* block duration */
.block-duration{position:absolute;bottom:4px;right:8px;font-size:13px;font-weight:700;color:#37352F;pointer-events:none;white-space:nowrap;line-height:1}

/* daily goal row */
.daily-goal-row{position:sticky;top:36px;background:#F7F6F3;border-bottom:1px solid #E9E9E7;z-index:5;flex-shrink:0;padding:5px 6px 4px;display:flex;flex-direction:column;gap:3px;cursor:default}
.dgrow-hours{font-size:11px;color:#37352F;white-space:nowrap;flex-shrink:0;line-height:1.3;font-weight:700;text-align:right;width:100%}
.dgrow-hours-actual{color:#27AE60}
.daily-goal-row.goals-hidden .dgrow-goals,.daily-goal-row.goals-hidden .dgrow-add{display:none}
.dgrow-goals{}
.dgrow-item{display:flex;align-items:center;gap:3px;margin-bottom:2px}
.dgrow-check{width:13px;height:13px;border:1.5px solid #C0BFBC;border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:transparent;transition:background .1s,border-color .1s}
.dgrow-check.done{background:#37352F;border-color:#37352F;color:#fff}
.dgrow-check.fail{background:#E03E3E;border-color:#E03E3E;color:#fff}
.dgrow-text{flex:1;font-size:14px;font-family:inherit;border:none;background:transparent;color:#37352F;outline:none;min-width:0;cursor:pointer;padding:0}
.dgrow-text:focus{cursor:text}
.dgrow-text.done-text{text-decoration:line-through;color:#9B9A97}
.dgrow-del{background:none;border:none;cursor:pointer;font-size:14px;color:#C0BFBC;padding:0;line-height:1;flex-shrink:0;opacity:0;transition:opacity .1s}
.dgrow-item:hover .dgrow-del{opacity:1}
.dgrow-del:hover{color:#E03E3E}
.dgrow-add{background:none;border:none;font-family:inherit;font-size:12px;color:#9B9A97;cursor:pointer;padding:0;text-align:left;flex-shrink:0;line-height:1.4}
.dgrow-add:hover{color:#37352F}
.time-goal-spacer{height:90px;flex-shrink:0;border-bottom:1px solid #E9E9E7;background:#F7F6F3}

/* monthly goals */
.monthly-total-row{font-size:14px;font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #F1F1EF;display:flex;align-items:center;justify-content:space-between}
.monthly-goal-item{display:flex;align-items:center;gap:6px;padding:3px 0}
.monthly-check{width:14px;height:14px;border:1.5px solid #C0BFBC;border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:transparent;transition:background .1s,border-color .1s}
.monthly-check.done{background:#37352F;border-color:#37352F;color:#fff}
.monthly-goal-text{flex:1;font-size:13px}
.monthly-goal-text.done-text{text-decoration:line-through;color:#9B9A97}
.monthly-del{background:none;border:none;cursor:pointer;font-size:16px;color:#C0BFBC;padding:0 2px;line-height:1}
.monthly-del:hover{color:#E03E3E}
.monthly-add-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.monthly-new-inp{flex:1;border:none;border-bottom:1px dashed #E9E9E7;font-family:inherit;font-size:13px;outline:none;background:transparent;padding:2px 0}
.monthly-new-inp:focus{border-bottom-color:#8AB4F8}
.monthly-add-btn{background:none;border:none;font-size:18px;cursor:pointer;color:#9B9A97;padding:0;line-height:1}
.monthly-add-btn:hover{color:#37352F}
.carryover{font-size:12px;color:#F28B82;padding:4px 6px;background:#FEF9F9;border:1px solid #FADBD8;border-radius:4px;margin-bottom:6px}

/* template panel */
.tmpl-panel{flex-shrink:0;border-top:1px solid #E9E9E7;background:#FAFAFA;overflow:hidden}
.tmpl-hdr{display:none}
.tmpl-body{padding:4px 14px 8px;display:flex;flex-wrap:wrap;gap:6px;max-height:100px;overflow-y:auto}
.tmpl-panel.collapsed .tmpl-body{display:none}
.tmpl-item{display:flex;align-items:center;gap:5px;border:1px solid #E9E9E7;border-radius:4px;padding:3px 7px;background:#fff;font-size:13px}
.tmpl-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.tmpl-apply{background:#F1F1EF;border:none;border-radius:3px;font-family:inherit;font-size:12px;cursor:pointer;padding:1px 5px;color:#37352F}
.tmpl-apply:hover{background:#E9E9E7}
.tmpl-del{background:none;border:none;cursor:pointer;font-size:15px;color:#C0BFBC;padding:0;line-height:1}
.tmpl-del:hover{color:#E03E3E}
.tmpl-apply-all{display:block;width:100%;margin-top:8px;padding:5px;background:#F1F1EF;border:none;border-radius:3px;font-family:inherit;font-size:12px;cursor:pointer;color:#37352F;text-align:center}
.tmpl-apply-all:hover{background:#E9E9E7}
.tmpl-empty{font-size:13px;color:#9B9A97;padding:2px 0}

/* dday pixel grid */
.dday-grid{flex-shrink:0;border-top:2px solid #E9E9E7;padding:8px 14px 10px;background:#FAFAFA}
.dday-grid-hdr{font-size:11px;color:#9B9A97;margin-bottom:7px;letter-spacing:.01em}
.dday-squares{display:flex;flex-wrap:wrap;gap:3px}
.dday-sq{width:14px;height:14px;border-radius:3px;cursor:pointer;flex-shrink:0;transition:transform .1s}
.dday-sq:hover{transform:scale(1.35);z-index:1;position:relative}
.dday-tip{position:fixed;background:#fff;border:1px solid #E9E9E7;border-radius:5px;padding:5px 10px;font-size:12px;color:#37352F;pointer-events:none;z-index:500;box-shadow:0 2px 10px rgba(0,0,0,.1);white-space:nowrap;line-height:1.7;display:none}

/* daily summary */
.daily-summary{flex-shrink:0;border-top:1px solid #E9E9E7;padding:6px 14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:13px;background:#FAFAFA}
.daily-summary-total{font-weight:600}
.daily-summary-item{display:flex;align-items:center;gap:4px;color:#9B9A97}
.daily-sum-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}

/* monthly grid view */
.month-wrap{flex:1;overflow:auto;padding:8px 12px;min-height:0}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.month-hdr-cell{font-size:12px;font-weight:600;color:#ABABAB;text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.04em}
.month-cell{border:1px solid #E9E9E7;border-radius:6px;min-height:72px;padding:4px 6px;cursor:pointer;transition:background .1s;position:relative}
.month-cell:hover{background:#F7F7F5}
.month-cell.today-cell{border-color:#2383E2}
.month-cell.other-month{opacity:.3}
.month-cell-num{font-size:13px;font-weight:600;margin-bottom:2px}
.month-cell.today-cell .month-cell-num{color:#2383E2}
.month-dots{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:2px}
.month-dot{width:6px;height:6px;border-radius:2px}
.month-cell-info{font-size:11px;color:#9B9A97;line-height:1.4}
.month-cell-rate{font-size:11px;color:#81C995}
.month-expand{border:1px solid #E9E9E7;border-radius:6px;padding:8px 10px;margin-top:4px;background:#fff}
.month-expand-hdr{font-size:14px;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.month-expand-close{background:none;border:none;cursor:pointer;font-size:16px;color:#9B9A97}
.month-blk-item{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #F4F4F2;font-size:13px}
.month-blk-item:last-child{border-bottom:none}
.month-blk-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.month-blk-time{font-size:12px;color:#9B9A97;white-space:nowrap}
.month-blk-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.month-blk-done{color:#81C995;font-size:10px}

/* retro panels */
.retro-panel{flex-shrink:0;border-top:1px solid #E9E9E7;padding:10px 14px;background:#FAFAFA}
.retro-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer;user-select:none}
.retro-title{font-size:12px;font-weight:600;color:#9B9A97;text-transform:uppercase;letter-spacing:.06em}
.retro-toggle-btn{background:none;border:none;font-size:12px;color:#9B9A97;cursor:pointer;padding:0;line-height:1}
.retro-body{display:flex;flex-direction:column;gap:6px}
.retro-panel.collapsed .retro-body{display:none}
.retro-row{display:flex;align-items:center;gap:8px}
.retro-label{font-size:12px;color:#9B9A97;white-space:nowrap;min-width:120px;flex-shrink:0}
.retro-input{flex:1;font-size:13px;font-family:inherit;border:none;border-bottom:1px dashed #E9E9E7;outline:none;background:transparent;color:#37352F;padding:2px 0}
.retro-input:focus{border-bottom-color:#8AB4F8}
.retro-stars{display:flex;gap:3px;align-items:center}
.retro-star{font-size:16px;cursor:pointer;color:#E9E9E7;transition:color .1s;line-height:1;padding:0 1px;background:none;border:none;font-family:inherit}
.retro-star.active{color:#FDD663}
.retro-star:hover,.retro-star:hover~.retro-star{color:#E9E9E7}
.retro-stars:hover .retro-star{color:#FDD663}
.retro-stars .retro-star:hover~.retro-star{color:#E9E9E7}
.retro-subj-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.retro-subj-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.retro-subj-name{font-size:12px;color:#9B9A97;min-width:90px;flex-shrink:0}
.retro-subj-stars{display:flex;gap:2px}
.retro-subj-star{font-size:13px;cursor:pointer;color:#E9E9E7;background:none;border:none;font-family:inherit;padding:0;line-height:1}
.retro-subj-star.active{color:#FDD663}

/* block focus button + memo indicator */
.block-focus-btn{position:absolute;top:3px;right:22px;width:14px;height:14px;border-radius:3px;border:none;background:transparent;font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .1s;z-index:5;color:#9B9A97;padding:0;line-height:1}
.block:hover .block-focus-btn{opacity:.55}
.block-focus-btn:hover{opacity:1!important;background:rgba(0,0,0,.06)}
.block-memo-dot{display:inline-block;width:4px;height:4px;border-radius:50%;opacity:.7;margin-left:4px;vertical-align:middle;flex-shrink:0}
.block-done-badge{display:inline-flex;align-items:center;justify-content:center;width:11px;height:11px;background:rgba(52,168,83,.85);border-radius:2px;color:#fff;font-size:7px;font-weight:700;margin-right:3px;vertical-align:middle;flex-shrink:0}

/* subject picker */
.subj-picker{position:fixed;background:#fff;border:1px solid #E9E9E7;border-radius:8px;padding:4px;z-index:1000;min-width:186px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.subj-picker-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:5px;cursor:pointer;font-size:14px;color:#37352F;white-space:nowrap}
.subj-picker-item:hover{background:#F7F7F5}

/* routine strip */

.routine-inner{padding:5px 14px 7px}
.routine-day-hdr{display:flex;margin-bottom:2px;gap:6px}
.routine-day-hdr-spacer{flex:0 0 92px}
.routine-day-hdr-item{width:22px;text-align:center;font-size:10px;font-weight:600;color:#9B9A97;flex-shrink:0}
.routine-day-hdr-item.today-col{color:#2383E2}

.routine-week-label{width:92px;flex-shrink:0;display:flex;align-items:center;gap:5px;font-size:12px;color:#9B9A97;overflow:hidden}

.routine-week-lbl-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.routine-day-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid #E9E9E7;background:transparent;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:background .1s,border-color .1s;flex-shrink:0;padding:0;line-height:1}
.routine-day-btn.done{border-color:#81C995;background:#81C995;color:#fff}
.routine-day-btn:hover:not(.done){background:#F1F1EF}

.routine-day-big-btn{width:44px;height:44px;border-radius:50%;border:2px solid #E9E9E7;background:transparent;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;padding:0;line-height:1}

/* ── mobile ──────────────────────────────────────────────────────────────── */
@media(max-width:768px){
  /* toolbar */
  .toolbar{padding:5px 8px;gap:5px;flex-wrap:wrap}
  .toolbar-brand{display:none}
  .toolbar .sep,#copyPrevWeek,#resetWeek,#tmplToggleBtn,
  #undoBtn,#redoBtn,#granGroup{display:none!important}
  #viewGroup .seg-btn{padding:3px 7px;font-size:12px}
  .dday{margin-left:0;font-size:11px;padding:2px 5px}
  .week-label{font-size:12px;min-width:80px}
  #syncBtn{margin-left:0!important}

  /* hide only template panel on mobile */
  #tmplPanel{display:none!important}

  /* hide daily goal rows — save vertical space */
  .daily-goal-row,.time-goal-spacer{display:none!important}

  /* stats panel: scrollable body, tap head to collapse */
  #statsPanel .stats-strip-head{cursor:pointer;padding:5px 10px}
  #statsPanel.m-collapsed .stats-body{display:none!important}
  #statsPanel .stats-body{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .stats-col-label{cursor:pointer;user-select:none}
  .stats-col-goals.m-col-collapsed > *:not(.stats-col-label),
  .stats-col-hours.m-col-collapsed > *:not(.stats-col-label){display:none!important}
  #statsPanel .wgoal-grid{grid-template-columns:1fr}
  #statsPanel .stats-col-goals{min-width:200px}
  #statsPanel .stats-col-hours{min-width:220px}

  /* dday grid: tap header to toggle squares */
  #ddayGrid .dday-grid-hdr{cursor:pointer;user-select:none}
  #ddayGrid.m-collapsed .dday-squares{display:none!important}

  /* time axis */
  .time-col{width:40px}
  .time-header-spacer{height:40px}
  .time-label{font-size:12px;right:4px}

  /* day header */
  .day-header{height:40px}
  .day-name{font-size:11px}
  .day-date{font-size:15px;font-weight:700}

  /* blocks: tap-friendly */
  .block{min-height:44px;padding:3px 26px 14px 5px}
  .block-done-btn{width:14px;height:14px;font-size:7px;border-radius:50%;
    top:3px;right:3px;opacity:.75}
  .block.completed .block-done-btn{opacity:1}
  .block-focus-btn{display:none!important}
  .block-subject{font-size:11px}
  .block-memo-text{font-size:11px}
  .block-duration{font-size:11px;font-weight:700}
  /* show resize handles on selected blocks */
  .block.selected .resize-s{opacity:1;height:18px}
  .block.selected .resize-n{opacity:1;height:14px}

  /* no crosshair on mobile */
  .day-body{cursor:default}

  /* day view: no horizontal scroll */
  body[data-view="day"] .planner-wrapper{overflow-x:hidden}

  /* week view: horizontal scroll with fixed time column */
  body[data-view="week"] .planner-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch}
  body[data-view="week"] .time-col{position:sticky;left:0;z-index:10}
  body[data-view="week"] .day-col{flex:0 0 140px;min-width:140px}
  body[data-view="week"] .day-header{position:sticky;top:0;z-index:5}

  /* month view: no horizontal scroll */
  body[data-view="month"] .planner-wrapper{overflow-x:hidden}

  /* routine: compact on mobile */
  .routine-inner{padding:4px 8px 5px}
  .routine-day-hdr-spacer{flex:0 0 68px}
  .routine-week-label{width:68px}
  .routine-week-lbl-text{display:none}
  .routine-day-hdr{gap:4px}
  .routine-week-days{gap:4px}
  .routine-day-btn{width:20px;height:20px;font-size:10px}
  .routine-day-hdr-item{width:20px}
  .routine-day-items{gap:12px;padding:6px 8px}
  .routine-day-big-btn{width:40px;height:40px;font-size:22px}
}
/* ── review ────────────────────────────────────────────────────────── */
.review-wrap{flex:1;overflow-y:auto;padding:16px 20px;min-height:0;background:#fff}
.review-sub-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.review-sub-tab{background:none;border:1px solid #E9E9E7;border-radius:20px;padding:4px 14px;font-family:inherit;font-size:13px;cursor:pointer;color:#9B9A97;transition:background .12s,color .12s,border-color .12s;white-space:nowrap}
.review-sub-tab.active{background:#37352F;border-color:#37352F;color:#fff}
.review-sub-tab.subj-tab.active{color:#fff}
.review-all-grid{display:flex;flex-direction:column;gap:8px}
.review-all-row{display:flex;flex-direction:column;gap:6px;padding:10px 14px;border:1px solid #E9E9E7;border-radius:8px;cursor:pointer;transition:background .1s;box-sizing:border-box;width:100%;overflow:hidden}
.review-all-row:hover{background:#F7F7F5}
.review-all-top{display:flex;align-items:center;gap:8px}
.review-all-badge{font-size:12px;font-weight:600;color:#fff;border-radius:12px;padding:2px 10px;white-space:nowrap;flex-shrink:0}
.review-all-cycle{font-size:12px;color:#9B9A97;white-space:nowrap}
.review-squares{display:flex;flex-wrap:wrap;gap:3px;width:100%;box-sizing:border-box}
.review-sq{width:20px;min-height:28px;border-radius:3px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:11px;line-height:1;padding:2px 0}
.review-sq.done{background:#81C995;color:#fff}
.review-sq.today{background:rgba(35,131,226,.12);border:2px solid #2383E2;color:#2383E2}
.review-sq.remaining{background:#E9E9E7;color:#37352F;filter:opacity(.32)}
.review-sq-lbl{font-size:6px;opacity:.85;line-height:1;letter-spacing:-.2px;font-weight:600}
.review-timeline{display:flex;align-items:center;gap:8px;margin:8px 0 4px}
.review-tl-date{font-size:11px;color:#9B9A97;flex-shrink:0}
.review-tl-bar{flex:1;height:12px;position:relative;display:flex;align-items:center}
.review-tl-track{position:absolute;left:0;right:0;height:2px;border-radius:2px}
.review-tl-dot{position:absolute;width:9px;height:9px;border-radius:50%;border:1.5px solid #fff;top:50%;transform:translate(-50%,-50%);z-index:1}
.review-all-info{font-size:11px;color:#9B9A97}
.review-section{margin-bottom:20px}
.review-section-title{font-size:11px;font-weight:600;color:#9B9A97;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:block}
.review-cycle-card{border:1px solid #E9E9E7;border-radius:8px;padding:14px 16px}
.review-cycle-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;color:#fff;margin-bottom:10px}
.review-cycle-props{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.review-cycle-prop{font-size:12px;color:#9B9A97}
.review-cycle-prop span{color:#37352F;font-weight:600}
.review-progress-bar{height:5px;border-radius:3px;background:#E9E9E7;overflow:hidden;margin-bottom:6px}
.review-progress-fill{height:100%;border-radius:3px;transition:width .3s}
.review-cycle-info{font-size:11px;color:#9B9A97}
.review-today-list{display:flex;flex-direction:column}
.review-today-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #F4F4F2;flex-wrap:wrap}
.review-today-item:last-child{border-bottom:none}
.review-item-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.review-item-actions{display:flex;align-items:center;gap:3px;flex-shrink:0;padding-top:1px}
.review-star-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px;line-height:1;opacity:.45;transition:opacity .1s}
.review-star-btn.active,.review-star-btn:hover{opacity:1}
.review-memo-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:2px 3px;line-height:1;color:#C0BFBC;transition:color .1s}
.review-memo-btn:hover{color:#37352F}
.review-tb-btn{background:none;border:1px solid #E9E9E7;border-radius:3px;cursor:pointer;font-size:10px;padding:2px 5px;color:#9B9A97;font-family:inherit;white-space:nowrap;line-height:1.4;transition:background .1s}
.review-tb-btn:hover{background:#F7F7F5;color:#37352F}
.review-tb-btn.used{color:#81C995;border-color:#81C995;cursor:default}
.review-tb-picker{flex:0 0 100%;align-items:center;gap:6px;padding:5px 0 2px 24px;flex-wrap:wrap;display:none}
.review-tb-picker.open{display:flex}
.review-tb-hour,.review-tb-dur{border:1px solid #E9E9E7;border-radius:3px;padding:3px 6px;font-family:inherit;font-size:12px;color:#37352F;background:#fff;outline:none}
.review-tb-confirm{background:#37352F;color:#fff;border:none;border-radius:3px;padding:3px 10px;font-family:inherit;font-size:12px;cursor:pointer;line-height:1.4}
.review-tb-close{background:none;border:none;cursor:pointer;font-size:12px;color:#9B9A97;padding:2px 4px;line-height:1}
.review-memo-area{display:none;padding-top:3px}
.review-memo-area.open{display:block}
.review-memo-inp{width:100%;border:none;border-bottom:1px dashed #E9E9E7;font-family:inherit;font-size:12px;color:#37352F;outline:none;background:transparent;padding:2px 0}
.review-memo-inp:focus{border-bottom-color:#8AB4F8}
.review-prev-memo{font-size:11px;color:#B0AFA9;font-style:italic;line-height:1.4}
.review-weak-badge{font-size:10px;color:#E03E3E;font-weight:700;background:#FEF0F0;border:1px solid #FADBD8;border-radius:3px;padding:1px 5px;display:inline-block;margin-bottom:2px}
.review-speed-box{background:#F7F7F5;border-radius:8px;padding:10px 14px;border:1px solid #E9E9E7}
.review-speed-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;gap:8px}
.review-speed-row span:first-child{color:#9B9A97;flex-shrink:0}
.review-banner{background:#F0FBF4;border:1px solid #81C995;border-radius:6px;padding:10px 14px;margin-bottom:14px;display:none;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap}
.review-banner.open{display:flex}
.review-banner span{flex:1;min-width:0}
.review-banner-edit{background:none;border:1px solid #81C995;border-radius:3px;cursor:pointer;font-size:12px;padding:2px 8px;color:#37352F;font-family:inherit;white-space:nowrap}
.review-banner-close{background:none;border:none;cursor:pointer;font-size:14px;color:#9B9A97;padding:0 2px;line-height:1;flex-shrink:0}
.review-weak-section{margin-top:16px;border-top:1px solid #E9E9E7;padding-top:16px}
.review-weak-subj{font-size:12px;font-weight:600;margin-bottom:4px;margin-top:10px}
.review-weak-item{font-size:12px;padding:2px 0;display:flex;align-items:center;gap:6px;color:#37352F}
#reviewToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#37352F;color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;z-index:800;pointer-events:none;opacity:0;transition:opacity .3s}
.review-today-check{width:16px;height:16px;border:1.5px solid #C0BFBC;border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#C5C4C0;transition:background .1s,border-color .1s}
.review-today-check.done{background:#81C995;border-color:#81C995;color:#fff}
.review-today-name{flex:1;font-size:13px;font-family:inherit;border:none;background:transparent;color:#37352F;outline:none;cursor:text;padding:0;line-height:1.4}
.review-today-name.done-text{text-decoration:line-through;color:#9B9A97}
.review-roadmap{display:flex;flex-direction:column;gap:2px}
.review-roadmap-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;transition:background .1s}
.review-roadmap-row:hover:not(.current-cycle){background:#F7F7F5}
.review-roadmap-circle{width:22px;height:22px;border-radius:50%;border:2px solid #E9E9E7;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#9B9A97;flex-shrink:0;line-height:1}
.review-roadmap-circle.done{background:#81C995;border-color:#81C995;color:#fff}
.review-roadmap-circle.current{background:#37352F;border-color:#37352F;color:#fff}
.review-roadmap-name{font-size:13px;font-weight:500;flex:1;min-width:0}
.review-roadmap-info{font-size:12px;color:#9B9A97;white-space:nowrap}
.review-roadmap-edit{background:none;border:1px solid #E9E9E7;border-radius:3px;font-size:11px;cursor:pointer;padding:2px 7px;color:#9B9A97;font-family:inherit;flex-shrink:0;line-height:1.5;transition:background .1s,color .1s}
.review-roadmap-edit:hover{background:#F7F7F5;color:#37352F}
.review-add-btn{margin-top:10px;width:100%;padding:9px;border:1px dashed #E9E9E7;border-radius:6px;background:none;font-family:inherit;font-size:13px;color:#9B9A97;cursor:pointer;transition:background .1s;text-align:center;display:block}
.review-add-btn:hover{background:#F7F7F5;color:#37352F}
.review-all-sched-btn{width:100%;padding:10px;border:1px solid #E9E9E7;border-radius:6px;background:none;font-family:inherit;font-size:13px;font-weight:600;color:#37352F;cursor:pointer;transition:background .1s,color .1s;text-align:center;display:block}
.review-all-sched-btn:hover:not(:disabled){background:#F7F7F5}
.review-empty{font-size:13px;color:#9B9A97;padding:12px 0}
.review-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:700;display:none;align-items:flex-end;justify-content:center}
.review-modal-overlay.open{display:flex}
.review-edit-sheet{background:#fff;border-radius:12px 12px 0 0;padding:20px;width:100%;max-width:480px;border:1px solid #E9E9E7;box-shadow:0 -4px 24px rgba(0,0,0,.12)}
.review-edit-title{font-size:16px;font-weight:600;margin-bottom:16px;color:#37352F}
.review-edit-field{margin-bottom:14px}
.review-edit-label{font-size:11px;font-weight:600;color:#9B9A97;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block}
.review-stepper{display:flex;align-items:center;gap:12px}
.review-stepper-btn{width:28px;height:28px;border:1px solid #E9E9E7;border-radius:4px;background:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:#37352F;line-height:1;font-family:inherit}
.review-stepper-btn:hover{background:#F7F7F5}
.review-stepper-val{font-size:15px;font-weight:600;min-width:40px;text-align:center}
.review-date-input{border:1px solid #E9E9E7;border-radius:4px;padding:5px 8px;font-family:inherit;font-size:14px;color:#37352F;outline:none;cursor:pointer}
.review-date-input:focus{border-color:#8AB4F8}
.review-auto-label{display:flex;align-items:center;gap:6px;font-size:12px;color:#9B9A97;cursor:pointer;margin-top:6px}
.review-suggestion{font-size:12px;color:#9B9A97;margin-top:8px;padding:6px 10px;background:#F7F7F5;border-radius:4px}
.review-edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
/* review date nav */
.review-date-nav{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.review-date-nav-label{font-size:13px;font-weight:500;min-width:150px;text-align:center;color:#37352F}
body.dark .review-date-nav-label{color:#E8E8E6}
/* cycle expand block list */
.rcex-toggle-btn{background:none;border:1px solid #E9E9E7;border-radius:3px;font-size:11px;cursor:pointer;padding:2px 8px;color:#9B9A97;font-family:inherit;margin-top:6px;transition:background .1s;display:inline-block}
.rcex-toggle-btn:hover{background:#F7F7F5;color:#37352F}
body.dark .rcex-toggle-btn{border-color:#333;color:#555}
body.dark .rcex-toggle-btn:hover{background:#272727;color:#E8E8E6}
.rcex-body{margin-top:8px;max-height:280px;overflow-y:auto}
.rcex-row{display:flex;align-items:flex-start;gap:5px;padding:4px 2px;font-size:12px;border-bottom:1px solid #F4F4F2;line-height:1.4}
.rcex-row:last-child{border-bottom:none}
body.dark .rcex-row{border-color:#2D2D2D}
.rcex-icon{flex-shrink:0;width:16px;font-size:11px;line-height:1.4}
.rcex-day{font-size:11px;color:#9B9A97;flex-shrink:0;min-width:26px;line-height:1.4}
.rcex-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#37352F}
body.dark .rcex-name{color:#C0C0BE}
.rcex-done .rcex-name{text-decoration:line-through;color:#C0BFBC}
.rcex-today .rcex-day,.rcex-today .rcex-name{color:#2383E2;font-weight:600}
.rcex-future .rcex-name{color:#C0BFBC}
</style>

<body>

<div class="toolbar">
  <span class="toolbar-brand">학습 플래너</span>
  <div class="sep"></div>
  <div class="seg-group" id="viewGroup">
    <button class="seg-btn" data-view="day">일간</button>
    <button class="seg-btn active" data-view="week">주간</button>
    <button class="seg-btn" data-view="month">월간</button>
    <button class="seg-btn" data-view="review">회독</button>
  </div>
  <div class="sep"></div>
  <div class="nav-row" id="mainNav">
    <button class="btn btn-nav" id="prevBtn">←</button>
    <span class="week-label" id="navLabel">—</span>
    <button class="btn btn-nav" id="nextBtn">→</button>
    <button class="btn u-hidden" id="todayBtn">오늘</button>
  </div>
  <button class="btn btn-icon" id="copyPrevWeek" data-tooltip="전주 복사"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
  <button class="btn btn-icon" id="resetWeek" data-tooltip="이번 주 초기화">🗑️</button>
  <button class="btn btn-icon" id="tmplToggleBtn" data-tooltip="반복 템플릿">🔁</button>
  <button class="btn btn-icon" id="undoBtn" data-tooltip="실행 취소 (Ctrl+Z)"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg></button>
  <button class="btn btn-icon" id="redoBtn" data-tooltip="다시 실행 (Ctrl+Y)"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg></button>
  <div class="sep"></div>
  <div class="seg-group" id="granGroup">
    <button class="seg-btn" data-gran="10">10분</button>
    <button class="seg-btn active" data-gran="30">30분</button>
    <button class="seg-btn" data-gran="60">60분</button>
  </div>
  <div class="tb-progress" id="tbProgress">
    <div class="tb-prog-bar" id="tbProgBar"></div>
    <span class="tb-prog-label" id="tbProgLabel"></span>
  </div>
  <div class="dday" id="ddayBadge">2차 시험 D-—</div>
  <button class="btn btn-icon" id="syncBtn" data-tooltip="동기화 상태" style="color:#81C995;pointer-events:none"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M6.657 18c-2.572 0 -4.657 -2.007 -4.657 -4.483c0 -2.475 2.085 -4.482 4.657 -4.482c.393 -1.762 1.794 -3.2 3.675 -3.773c1.88 -.572 3.956 -.193 5.444 1c1.488 1.19 2.162 3.007 1.77 4.769h.99c1.913 0 3.464 1.56 3.464 3.486c0 1.927 -1.551 3.487 -3.465 3.487h-11.878"/><path d="M9 12l2 2l4 -4"/></svg></button>
</div>

<div id="statsPanel" class="stats-strip">
  <div class="stats-strip-head" id="statsHdr" style="cursor:pointer">
    <span class="stats-strip-title">목표 &amp; 통계</span>
    <button class="btn btn-icon" id="statsCollapseBtn" style="margin-left:auto;font-size:11px;padding:2px 6px;line-height:1.4">▼</button>
  </div>
  <div class="stats-body" id="statsBody"></div>
</div>

<div class="planner-wrapper" id="plannerWrapper">
  <div class="planner-grid">
    <div class="time-col">
      <div class="time-header-spacer"><button class="goal-collapse-btn" id="goalCollapseBtn" title="목표 접기/펼치기">▼</button></div>
      <div class="time-goal-spacer"></div>
      <div class="time-labels-wrap" id="timeLabels"></div>
    </div>
    <div class="days-area" id="daysArea"></div>
  </div>
</div>

<div class="daily-summary u-hidden" id="dailySummary"></div>

<div class="retro-panel u-hidden" id="dailyRetro">
  <div class="retro-header" id="dailyRetroHdr">
    <span class="retro-title">오늘의 회고</span>
    <button class="retro-toggle-btn" id="dailyRetroToggle">접기 ▲</button>
  </div>
  <div class="retro-body" id="dailyRetroBody"></div>
</div>

<div class="retro-panel collapsed u-hidden" id="weeklyRetro">
  <div class="retro-header" id="weeklyRetroHdr">
    <span class="retro-title">주간 회고</span>
    <button class="retro-toggle-btn" id="weeklyRetroToggle">펼치기 ▼</button>
  </div>
  <div class="retro-body" id="weeklyRetroBody"></div>
</div>

<div class="dday-grid u-hidden" id="ddayGrid">
  <div class="dday-grid-hdr" id="ddayGridHdr"></div>
  <div class="dday-squares" id="ddaySquares"></div>
</div>

<div class="month-wrap u-hidden" id="monthWrap"></div>

<div class="review-wrap u-hidden" id="reviewWrap">
  <div class="review-sub-tabs" id="reviewSubTabs"></div>
  <div class="review-date-nav" id="reviewDateNav" style="display:none"></div>
  <div class="review-banner" id="reviewBanner">
    <span class="review-banner-msg"></span>
    <button class="review-banner-edit" id="reviewBannerEdit">수정</button>

  </div>
  <div id="reviewContent"></div>
</div>
<div id="reviewToast"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">

    <div class="field">
      <label>과목</label>
      <select id="editSubject">
        <option value="labor_law">노동법</option>
        <option value="hr_mgmt">인사노무관리</option>
        <option value="admin_law">행정쟁송법</option>

      </select>

    <div class="field">
      <label>범위</label>
      <textarea id="editMemo" placeholder="학습 범위 (예: 민법 §103–§110)..." style="min-height:48px"></textarea>

function setSyncStatus(s){
  const btn=document.getElementById('syncBtn');if(!btn)return;
  if(s==='saving'){
    if(_syncTimer){clearTimeout(_syncTimer);_syncTimer=null;}
    btn.innerHTML=_CLOUD_UPLOAD;btn.style.color='#9B9A97';
  }else{
    if(_syncTimer)clearTimeout(_syncTimer);

  }

function _getSyncMeta(){try{return JSON.parse(localStorage.getItem('_planner_sync_meta')||'{}');}catch{return{};}}
function _setSyncMeta(key,ts){try{const m=_getSyncMeta();m[key]=ts;localStorage.setItem('_planner_sync_meta',JSON.stringify(m));}catch{}}

async function syncToSupabase(key,valueStr){
  if(!_sb)return;
  const ts=new Date().toISOString();
  _setSyncMeta(key,ts);
  setSyncStatus('saving');
  try{
    await _sb.from('planner_data').upsert({key,value:valueStr,updated_at:ts},{onConflict:'key'});
    setSyncStatus('synced');
  }catch(e){setSyncStatus('synced');}
}

function _isPlannerKey(k){
  return k&&k!=='_planner_sync_meta'&&k!=='darkMode'&&(
    k.startsWith('week_')||k==='weeklyGoals'||k==='templates'||
    k.startsWith('weeklyTextGoals_')||k.startsWith('monthlyGoals_')||
    k.startsWith('dailyGoals_')||k.startsWith('retro_')||k.startsWith('routine_')
  );
}

async function _loadFromSupabase(){
  if(!_sb)return{updated:false,remoteKeys:new Set()};
  try{
    const{data,error}=await _sb.from('planner_data').select('*');
    if(error||!data)return{updated:false,remoteKeys:new Set()};
    const meta=_getSyncMeta();
    const remoteKeys=new Set(data.map(r=>r.key));
    let updated=false;
    data.forEach(row=>{
      const localTs=meta[row.key];
      if(!localTs||new Date(row.updated_at)>new Date(localTs)){
        localStorage.setItem(row.key,row.value);
        _setSyncMeta(row.key,row.updated_at);
        updated=true;
      }
    });
    return{updated,remoteKeys};
  }catch(e){return{updated:false,remoteKeys:new Set()};}
}

async function _pushMissingToSupabase(remoteKeys){
  if(!_sb)return;
  const rows=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!_isPlannerKey(k)||remoteKeys.has(k))continue;
    rows.push({key:k,value:localStorage.getItem(k),updated_at:new Date().toISOString()});
  }
  if(!rows.length)return;
  setSyncStatus('saving');
  try{
    await _sb.from('planner_data').upsert(rows,{onConflict:'key'});
    rows.forEach(r=>_setSyncMeta(r.key,r.updated_at));
    setSyncStatus('synced');
  }catch(e){setSyncStatus('synced');}
}

async function initAndSync(){
  try{
    if(!window.supabase)return;
    _sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

    monthlyGoals=loadMonthlyGoals(new Date());
    templates=loadTemplates();
    blocks=loadWeek(currentMonday);
    render();
  }
  setSyncStatus('synced');
}

function getMondayOf(d) {
  const r=new Date(d); r.setHours(0,0,0,0);
  const wd=r.getDay(); r.setDate(r.getDate()+(wd===0?-6:1-wd)); return r;
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function isoWeek(d){
  const r=new Date(d);r.setHours(0,0,0,0);r.setDate(r.getDate()+3-(r.getDay()+6)%7);
  const j=new Date(r.getFullYear(),0,4);
  return 1+Math.round(((r-j)/86400000-3+(j.getDay()+6)%7)/7);
}
function weekKey(m){return `week_${m.getFullYear()}-W${String(isoWeek(m)).padStart(2,'0')}`;}
function weekLabelStr(m){return `${m.getFullYear()}년 ${m.getMonth()+1}월 ${Math.ceil(m.getDate()/7)}주`;}
function monthLabelStr(d){return `${d.getFullYear()}년 ${d.getMonth()+1}월`;}
function fmtDate(d){return `${d.getMonth()+1}/${d.getDate()}`;}
function fmtTime(min){return `${String(Math.floor(min/60)).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`;}
function fmtDuration(m){const h=Math.floor(m/60),mins=m%60;if(h===0)return `${mins}m`;return mins?`${h}h ${mins}m`:`${h}h`;}
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function monthStorageKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}

// ── grid math ─────────────────────────────────────────────────────────────────
function ppm(){return PPM[gran];}
function minToY(min){return(min-START_M)*ppm();}
function yToMin(y){return START_M+y/ppm();}
function snapMin(min){return Math.round(min/gran)*gran;}
function clampMin(m){return Math.max(START_M,Math.min(END_M,m));}
function totalH(){return TOTAL_M*ppm();}
function isLight(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>160;}
function darken(hex,a){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.max(0,r-a);g=Math.max(0,g-a);b=Math.max(0,b-a);return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}
function hexToRgba(hex,alpha){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${alpha})`;}

// ── statistics ────────────────────────────────────────────────────────────────
function renderStats(){
  const keys=Object.keys(SUBJECTS);
  const stats={};keys.forEach(k=>{stats[k]={done:0,total:0};});
  blocks.forEach(blk=>{
    if(blk.ghost)return;
    const k=SUBJECTS[blk.subject]?blk.subject:'rest';
    const dur=(blk.endMin-blk.startMin)/60;
    stats[k].total+=dur;if(blk.completed)stats[k].done+=dur;
  });
  const studyKeys=keys.filter(k=>k!=='rest'&&k!=='precedent');

  // Per-subject hours grid
  let gridRows='<div class="stats-hours-grid2">';
  studyKeys.forEach(key=>{
    const subj=SUBJECTS[key];const{total}=stats[key];
    gridRows+=`<div class="stats-h2-cell">`+
      `<span class="stats-dot" style="background:${subj.color};width:7px;height:7px;margin-top:0;flex-shrink:0"></span>`+
      `<span class="stats-h2-name">${subj.short}</span>`+
      `<span class="stats-h2-val">${total>0?total.toFixed(1)+'h':'—'}</span>`+
    `</div>`;
  });
  gridRows+='</div>';
  const col2=`<div class="stats-col-hours">`+
    `<div class="stats-col-label">과목별 공부시간</div>`+
    `<div class="stats-hours-inner"><div>${gridRows}</div></div>`+
  `</div>`;

  // Weekly goals column (always shown)
  let col3=`<div class="stats-col-goals"><div class="stats-col-label">주간 목표</div><div class="wgoal-grid">`;
  studyKeys.forEach(key=>{
    const subj=SUBJECTS[key];
    const tg=weeklyTextGoals[key]||{text:'',done:false};
    col3+=`<div class="wgoal-row">`+
      `<div class="wgoal-check${tg.done?' done':''}" data-wcheck="${key}">${tg.done?'✓':''}</div>`+
      `<span class="stats-dot" style="background:${subj.color}"></span>`+
      `<input class="wgoal-text-input${tg.done?' done-text':''}" data-wkey="${key}" value="${escHtml(tg.text)}" placeholder="${subj.short} 이번 주 목표...">`+
    `</div>`;
  });
  col3+=`</div></div>`;

  const body=document.getElementById('statsBody');
  body.innerHTML=col3+col2;

  if(isMobile()){
    [['stats-col-goals','_mGoalsCollapsed'],['stats-col-hours','_mHoursCollapsed']].forEach(([cls,stateKey])=>{
      const col=body.querySelector('.'+cls);if(!col)return;
      const lbl=col.querySelector('.stats-col-label');if(!lbl)return;
      if(window[stateKey])col.classList.add('m-col-collapsed');
      const arr=document.createElement('span');
      arr.style.cssText='float:right;color:#9B9A97;font-size:10px;font-weight:400;margin-left:6px';
      arr.textContent=window[stateKey]?'▶':'▼';
      lbl.appendChild(arr);
      lbl.addEventListener('click',()=>{
        col.classList.toggle('m-col-collapsed');
        window[stateKey]=col.classList.contains('m-col-collapsed');
        arr.textContent=window[stateKey]?'▶':'▼';
      });
    });
  }

  body.querySelectorAll('[data-wcheck]').forEach(el=>{
    el.addEventListener('click',()=>{
      const k=el.dataset.wcheck;
      if(!weeklyTextGoals[k])weeklyTextGoals[k]={text:'',done:false};
      weeklyTextGoals[k].done=!weeklyTextGoals[k].done;
      saveWeeklyTextGoals();renderStats();
    });
  });
  body.querySelectorAll('[data-wkey]').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const k=inp.dataset.wkey;
      if(!weeklyTextGoals[k])weeklyTextGoals[k]={text:'',done:false};
      weeklyTextGoals[k].text=inp.value.trim();
      saveWeeklyTextGoals();
    });
  });
}

// ── toolbar progress bar ──────────────────────────────────────────────────────
function renderToolbarProgress(){
  const bar=document.getElementById('tbProgBar');
  const label=document.getElementById('tbProgLabel');
  if(!bar||!label)return;
  const studyKeys=Object.keys(SUBJECTS).filter(k=>k!=='rest');
  let src;
  if(viewMode==='day'){
    const vDay=dayIdx(currentDay);
    src=blocks.filter(b=>b.day===vDay&&!b.ghost&&studyKeys.includes(b.subject));
  }else{
    src=blocks.filter(b=>!b.ghost&&studyKeys.includes(b.subject));
  }
  const total=src.reduce((s,b)=>s+(b.endMin-b.startMin)/60,0);
  const done=src.filter(b=>b.completed).reduce((s,b)=>s+(b.endMin-b.startMin)/60,0);
  const pct=total>0?Math.round(done/total*100):0;
  // Build subject-colored segments for completed hours, then gray for remaining
  let segs='';
  if(total>0){
    studyKeys.forEach(key=>{
      const subj=SUBJECTS[key];
      const keyDone=src.filter(b=>b.subject===key&&b.completed).reduce((s,b)=>s+(b.endMin-b.startMin)/60,0);
      if(keyDone>0)segs+=`<div style="width:${(keyDone/total*100).toFixed(1)}%;background:${subj.color};height:100%"></div>`;
    });
    if(done<total)segs+=`<div style="width:${((total-done)/total*100).toFixed(1)}%;background:#E0E0E0;height:100%"></div>`;
  }
  bar.innerHTML=segs;
  label.innerHTML=`<span style="color:#2383E2;font-weight:600">${done.toFixed(1)}h</span> / ${total.toFixed(1)}h · ${pct}%`;
}

function addRestBlock(blockId){
  const blk=getBlock(blockId);if(!blk)return;if(blk.endMin>=END_M)return;
  pushUndo();
  const newEnd=Math.min(blk.endMin+20,END_M);
  blocks.push({id:uid(),day:blk.day,startMin:blk.endMin,endMin:newEnd,subject:'rest',memo:'휴식',completed:false});

// ── inline memo edit ─────────────────────────────────────────────────────────
function activateInlineEdit(blockId){
  if(inlineEditingId===blockId)return;
  const blk=getBlock(blockId);if(!blk)return;
  const contentRow=document.querySelector(`.block[data-id="${blockId}"] .block-content-row`);
  const memoEl=document.querySelector(`.block[data-id="${blockId}"] .block-memo-text`);if(!memoEl)return;
  if(contentRow)contentRow.classList.remove('u-hidden');
  inlineEditingId=blockId;
  const origMemo=blk.memo||'';let committed=false;
  memoEl.contentEditable='true';memoEl.textContent=origMemo;memoEl.focus();
  const range=document.createRange();range.selectNodeContents(memoEl);range.collapse(false);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  function commit(){if(committed)return;committed=true;inlineEditingId=null;const nm=memoEl.textContent.trim();if(nm!==origMemo)pushUndo();blk.memo=nm;memoEl.contentEditable='false';saveWeek();renderBlocks();}
  function revert(){committed=true;inlineEditingId=null;memoEl.contentEditable='false';memoEl.textContent=origMemo;}
  memoEl.addEventListener('blur',commit,{once:true});
  memoEl.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'&&!ev.metaKey&&!ev.ctrlKey){
      ev.preventDefault();
      const sel=window.getSelection();if(!sel.rangeCount)return;
      const range=sel.getRangeAt(0);range.deleteContents();
      const nl=document.createTextNode('\n');range.insertNode(nl);
      range.setStartAfter(nl);range.setEndAfter(nl);sel.removeAllRanges();sel.addRange(range);
    }
    if(ev.key==='Escape'){ev.stopPropagation();memoEl.removeEventListener('blur',commit);revert();}
  });
}

function activateNoteEdit(blockId){
  if(inlineEditingId===blockId+'_note')return;
  const blk=getBlock(blockId);if(!blk)return;
  const noteEl=document.querySelector(`.block[data-id="${blockId}"] .block-note`);if(!noteEl)return;

  function commit(){if(committed)return;committed=true;inlineEditingId=null;const nn=noteEl.textContent.trim();if(nn!==origNote)pushUndo();blk.note=nn;noteEl.contentEditable='false';saveWeek();renderBlocks();}
  function revert(){committed=true;inlineEditingId=null;noteEl.contentEditable='false';noteEl.textContent=origNote;}
  noteEl.addEventListener('blur',commit,{once:true});
  noteEl.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'&&!ev.metaKey&&!ev.ctrlKey){
      ev.preventDefault();
      const sel=window.getSelection();if(!sel.rangeCount)return;
      const range=sel.getRangeAt(0);range.deleteContents();
      const nl=document.createTextNode('\n');range.insertNode(nl);

}

function saveAsTemplate(blk){
  templates.push({id:uid(),day:blk.day,startMin:blk.startMin,endMin:blk.endMin,subject:blk.subject,memo:blk.memo||''});
  saveTemplates();renderTemplates();
}
function applyTemplate(tmpl){
  if(blocks.some(b=>b.day===tmpl.day&&b.startMin===tmpl.startMin&&!b.ghost))return;
  pushUndo();
  blocks.push({id:uid(),day:tmpl.day,startMin:tmpl.startMin,endMin:tmpl.endMin,subject:tmpl.subject,memo:tmpl.memo,completed:false});
  saveWeek();renderBlocks();
}
function applyAllTemplates(){
  if(!templates.length)return;
  pushUndo();
  let added=false;
  templates.forEach(t=>{
    if(!blocks.some(b=>b.day===t.day&&b.startMin===t.startMin&&!b.ghost)){
      blocks.push({id:uid(),day:t.day,startMin:t.startMin,endMin:t.endMin,subject:t.subject,memo:t.memo,completed:false});
      added=true;
    }
  });
  if(added){saveWeek();renderBlocks();}
}
function renderTemplates(){
  const body=document.getElementById('tmplBody');
  if(!templates.length){body.innerHTML='<span class="tmpl-empty">저장된 템플릿 없음</span>';return;}
  body.innerHTML=templates.map(t=>{
    const subj=SUBJECTS[t.subject]||SUBJECTS.rest;
    return `<div class="tmpl-item"><span class="tmpl-dot" style="background:${subj.color}"></span><span>${subj.short} ${DAYS[t.day]} ${fmtTime(t.startMin)}</span><button class="tmpl-apply" data-tapply="${t.id}">적용</button><button class="tmpl-del" data-tdel="${t.id}">×</button></div>`;
  }).join('')+`<button class="tmpl-apply-all">이번 주 전체 적용</button>`;
  body.querySelectorAll('[data-tapply]').forEach(btn=>btn.addEventListener('click',()=>{const t=templates.find(x=>x.id===btn.dataset.tapply);if(t)applyTemplate(t);}));
  body.querySelectorAll('[data-tdel]').forEach(btn=>btn.addEventListener('click',()=>{templates=templates.filter(x=>x.id!==btn.dataset.tdel);saveTemplates();renderTemplates();}));
  body.querySelector('.tmpl-apply-all').addEventListener('click',applyAllTemplates);
}

function scheduleReview(blk){
  const srcDate=addDays(currentMonday,blk.day);

// ── dday pixel grid ───────────────────────────────────────────────────────────
const DDAY_START = new Date(2026,4,26); // May 26 2026
const DDAY_EXAM  = new Date(2026,7,30); // Aug 30 2026

function computeDayCompletionRate(date){
  const db=loadBlocksForDate(date).filter(b=>!b.ghost);
  if(!db.length)return -1; // -1 = no blocks
  const total=db.reduce((s,b)=>s+(b.endMin-b.startMin),0);
  const done=db.filter(b=>b.completed).reduce((s,b)=>s+(b.endMin-b.startMin),0);
  return total>0?done/total*100:0;
}

function buildDdayGrid(){
  const el=document.getElementById('ddayGrid');
  if(!el)return;
  if(viewMode!=='week'){el.classList.add('u-hidden');return;}
  el.classList.remove('u-hidden');

  const today=new Date();today.setHours(0,0,0,0);
  const examMs=DDAY_EXAM.getTime();
  const todayMs=today.getTime();
  const diffDays=Math.ceil((examMs-todayMs)/86400000);

  // collect all days in range
  const days=[];
  for(let d=new Date(DDAY_START);d<=DDAY_EXAM;d.setDate(d.getDate()+1))days.push(new Date(d));

  let doneCount=0,missCount=0;
  days.forEach(d=>{
    if(d>=today)return;
    const rate=computeDayCompletionRate(d);
    if(rate<0)missCount++;       // no blocks = missed
    else if(rate>=80)doneCount++;
    else missCount++;
  });

  document.getElementById('ddayGridHdr').textContent=
    `시험까지 D-${Math.max(diffDays,0)}일 · ${doneCount}일 완료 · ${missCount}일 미완료`;

  const wrap=document.getElementById('ddaySquares');
  wrap.innerHTML='';

  days.forEach(d=>{
    const isToday=isSameDay(d,today);
    const isExam=isSameDay(d,DDAY_EXAM);
    const isPast=d<today;
    const dk=dateKey(d);

    const sq=document.createElement('div');
    sq.className='dday-sq';
    sq.dataset.date=dk;

    if(isExam){
      sq.style.background='#F28B82';
    } else if(isToday){
      sq.style.background='#fff';
      sq.style.border='2px solid #37352F';
    } else if(isPast){
      const rate=computeDayCompletionRate(d);
      if(rate<0)sq.style.background='#E0E0E0';
      else if(rate>=80)sq.style.background='#81C995';
      else sq.style.background='#FDD663';
    } else {
      sq.style.background='#F1F1EF';
    }

    wrap.appendChild(sq);
  });

  // tooltip
  let tip=document.getElementById('ddayTip');
  if(!tip){tip=document.createElement('div');tip.id='ddayTip';tip.className='dday-tip';document.body.appendChild(tip);}

  wrap.querySelectorAll('.dday-sq').forEach(sq=>{
    sq.addEventListener('mouseenter',e=>{
      const d=new Date(sq.dataset.date+'T00:00:00');
      const db=loadBlocksForDate(d).filter(b=>!b.ghost);
      const totalM=db.reduce((s,b)=>s+(b.endMin-b.startMin),0);
      const doneM=db.filter(b=>b.completed).reduce((s,b)=>s+(b.endMin-b.startMin),0);
      const rate=totalM>0?Math.round(doneM/totalM*100):0;
      const label=isSameDay(d,DDAY_EXAM)?'시험일 🎯':sq.dataset.date;
      tip.innerHTML=`<strong>${label}</strong><br>`+
        (totalM>0?`${(totalM/60).toFixed(1)}h 공부 · 완료율 ${rate}%`:'기록 없음');
      tip.style.display='block';
      moveTip(e);
    });
    sq.addEventListener('mousemove',moveTip);
    sq.addEventListener('mouseleave',()=>{tip.style.display='none';});
    sq.addEventListener('click',()=>{
      const d=new Date(sq.dataset.date+'T00:00:00');
      currentDay=d;currentMonday=getMondayOf(currentDay);
      blocks=loadWeek(currentMonday);viewMode='day';
      document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view==='day'));
      renderDailyView();
    });
  });

  function moveTip(e){
    const x=e.clientX+14,y=e.clientY-40;
    tip.style.left=x+'px';tip.style.top=y+'px';
  }
}

    r.style.display='';
    r.style.height='auto';

  });

function buildGoalRowContent(rowEl, dk){
  const goals=loadDailyGoals(dk);
  const d=parseInt(rowEl.dataset.day);
  const{planned,actual}=computeDayHours(d);
  let html=`<div class="dgrow-hours"><span class="dgrow-hours-actual">${actual}h</span> / ${planned}h</div><div class="dgrow-goals">`;
  goals.forEach(g=>{
    const status=getGoalStatus(g);
    const isDone=status==='done';const isFail=status==='fail';
    const checkClass=isDone?' done':isFail?' fail':'';
    const checkContent=isDone?'✓':isFail?'✗':'';
    html+=`<div class="dgrow-item">`+
      `<div class="dgrow-check${checkClass}" data-dgcheck="${g.id}">${checkContent}</div>`+
      `<input class="dgrow-text${isDone?' done-text':''}" data-dgtext="${g.id}" value="${escHtml(g.text)}" placeholder="목표...">`+
      `<button class="dgrow-del" data-dgdel="${g.id}" tabindex="-1">×</button>`+
    `</div>`;
  });
  html+=`</div><button class="dgrow-add" tabindex="-1">+ 목표</button>`;
  rowEl.innerHTML=html;
  rowEl.querySelectorAll('[data-dgcheck]').forEach(el=>{
    el.addEventListener('mousedown',e=>e.stopPropagation());
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const gs=loadDailyGoals(dk);
      const g=gs.find(x=>x.id===el.dataset.dgcheck);
      if(g){
        const cur=getGoalStatus(g);
        const next=cur===''?'done':cur==='done'?'fail':'';
        g.status=next;g.done=next==='done';
        gs.sort((a,b)=>(getGoalStatus(a)===''?0:1)-(getGoalStatus(b)===''?0:1));
        saveDailyGoals(dk,gs);
        buildGoalRowContent(rowEl,dk);
        syncGoalRowHeight();
      }
    });
  });
  rowEl.querySelectorAll('[data-dgtext]').forEach(inp=>{
    inp.addEventListener('mousedown',e=>e.stopPropagation());
    inp.addEventListener('click',e=>e.stopPropagation());
    const _saveGoalText=()=>{const gs=loadDailyGoals(dk);const g=gs.find(x=>x.id===inp.dataset.dgtext);if(g){g.text=inp.value.trim();saveDailyGoals(dk,gs);}};
    inp.addEventListener('input',_saveGoalText);
    inp.addEventListener('change',_saveGoalText);
    inp.addEventListener('keydown',e=>{
      if(e.key==='Tab'){e.preventDefault();return;}
      if(e.key==='Backspace'&&inp.value===''){
        e.preventDefault();
        let gs=loadDailyGoals(dk);gs=gs.filter(x=>x.id!==inp.dataset.dgtext);
        saveDailyGoals(dk,gs);buildGoalRowContent(rowEl,dk);syncGoalRowHeight();
      }
    });
  });
  rowEl.querySelectorAll('[data-dgdel]').forEach(btn=>{
    btn.addEventListener('mousedown',e=>e.stopPropagation());
    btn.addEventListener('click',e=>{e.stopPropagation();let gs=loadDailyGoals(dk);gs=gs.filter(x=>x.id!==btn.dataset.dgdel);saveDailyGoals(dk,gs);buildGoalRowContent(rowEl,dk);syncGoalRowHeight();});
  });
  const addBtn=rowEl.querySelector('.dgrow-add');
  addBtn.addEventListener('mousedown',e=>e.stopPropagation());
  addBtn.addEventListener('click',e=>{e.stopPropagation();const gs=loadDailyGoals(dk);gs.push({id:uid(),text:'',status:'',done:false});saveDailyGoals(dk,gs);buildGoalRowContent(rowEl,dk);syncGoalRowHeight();const inps=rowEl.querySelectorAll('[data-dgtext]');if(inps.length)inps[inps.length-1].focus();});
}

  el.style.cssText=`top:${minToY(blk.startMin)}px;height:${h}px;border-left:3px ${borderStyle} ${subj.color};--block-h:${h}px;`;
  const statusBadge=blkStatus==='done'?`<span class="block-done-badge">✓</span>`:blkStatus==='fail'?`<span class="block-fail-badge">✗</span>`:'';
  const subjLabel=statusBadge+`<span class="block-subj-name" data-subj-pick="${blk.id}">${subj.name}</span>`+(blk.memo?`<span class="block-memo-dot" style="background:${subj.color}"></span>`:'');
  el.innerHTML=
    `<div class="resize-n" data-rid="${blk.id}" data-rdir="n"></div>`+
    `<button class="block-done-btn" data-done="${blk.id}">${blkStatus==='fail'?'✗':'✓'}</button>`+
    (!isGhost?`<button class="block-focus-btn" data-focus="${blk.id}">▶</button>`:'')+
    `<div class="block-subject">${subjLabel}</div>`+
    (isGhost?`<div class="block-review-label">${blk.ghostLabel||'복습'}</div>`:'')+
    `<div class="block-content-row${showContent?'':' u-hidden'}">`+
      `<svg class="block-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${subj.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconPaths}</svg>`+
      `<span class="block-memo-text" data-inline-edit="${blk.id}">${blk.memo?escHtml(blk.memo):''}</span>`+
    `</div>`+
    `<div class="block-note${showNote?'':' u-hidden'}${(!blk.note&&viewMode==='day')?' empty':''}" data-note-edit="${blk.id}">${blk.note?escHtml(blk.note):(viewMode==='day'?'메모...':'')}</div>`+
    `<div class="block-time-label">${fmtTime(blk.startMin)}–${fmtTime(blk.endMin)}</div>`+
    (!isGhost&&dur>90?`<div class="block-warn">90분 초과 <button class="warn-btn" data-add-rest="${blk.id}">휴식 추가?</button></div>`:'')+
    `<div class="block-duration">${fmtDuration(dur)}</div>`+
    `<div class="resize-w" data-rid="${blk.id}" data-rdir="w"></div>`+
    `<div class="resize-e" data-rid="${blk.id}" data-rdir="e"></div>`+
    `<div class="resize-s" data-rid="${blk.id}" data-rdir="s"></div>`;
  return el;
}

function computeDayStudyH(dayIndex){
  const mins=blocks.filter(b=>b.day===dayIndex&&!b.ghost&&b.subject!=='rest').reduce((s,b)=>s+(b.endMin-b.startMin),0);
  return (mins/60).toFixed(1);
}
function computeDayHours(dayIndex){
  const db=blocks.filter(b=>b.day===dayIndex&&!b.ghost&&b.subject!=='rest');
  const planned=(db.reduce((s,b)=>s+(b.endMin-b.startMin),0)/60).toFixed(1);
  const actual=(db.filter(b=>b.completed).reduce((s,b)=>s+(b.endMin-b.startMin),0)/60).toFixed(1);
  return{planned,actual};
}
function getGoalStatus(g){
  if(g.status!==undefined)return g.status;
  return g.done?'done':'';
}
function updateDailyGoalRows(){
  document.querySelectorAll('.daily-goal-row').forEach(row=>{
    const d=parseInt(row.dataset.day);
    const el=row.querySelector('.dgrow-hours');
    if(el){const{planned,actual}=computeDayHours(d);el.innerHTML=`<span class="dgrow-hours-actual">${actual}h</span> / ${planned}h`;}
  });
}

function renderBlocks(){
  document.querySelectorAll('.block').forEach(el=>el.remove());
  const vDay=viewMode==='day'?dayIdx(currentDay):null;

    if(vDay!==null&&blk.day!==vDay)return;
    const body=document.querySelector(`.day-body[data-day="${blk.day}"]`);if(!body)return;
    body.appendChild(buildBlockEl(blk));
  });
