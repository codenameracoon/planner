<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노무사 플래너</title>
<meta name="theme-color" content="#F28B82">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="플래너">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-brand">학습 플래너</span>
  <div class="sep"></div>
  <div class="seg-group" id="viewGroup">
    <button class="seg-btn" data-view="day">일간</button>
    <button class="seg-btn active" data-view="week">주간</button>
    <button class="seg-btn" data-view="month">월간</button>
    <button class="seg-btn" data-view="review">회독</button>
  </div>
  <div class="sep"></div>
  <div class="nav-row" id="mainNav">
    <button class="btn btn-nav" id="prevBtn">←</button>
    <span class="week-label" id="navLabel">—</span>
    <button class="btn btn-nav" id="nextBtn">→</button>
    <button class="btn u-hidden" id="todayBtn">오늘</button>
  </div>
  <button class="btn btn-icon" id="copyPrevWeek" data-tooltip="전주 복사"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
  <button class="btn btn-icon" id="resetWeek" data-tooltip="이번 주 초기화">🗑️</button>
  <button class="btn btn-icon" id="tmplToggleBtn" data-tooltip="반복 템플릿">🔁</button>
  <button class="btn btn-icon" id="undoBtn" data-tooltip="실행 취소 (Ctrl+Z)"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg></button>
  <button class="btn btn-icon" id="redoBtn" data-tooltip="다시 실행 (Ctrl+Y)"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg></button>
  <div class="sep"></div>
  <div class="seg-group" id="granGroup">
    <button class="seg-btn" data-gran="10">10분</button>
    <button class="seg-btn active" data-gran="30">30분</button>
    <button class="seg-btn" data-gran="60">60분</button>
  </div>
  <div class="tb-progress" id="tbProgress">
    <div class="tb-prog-bar" id="tbProgBar"></div>
    <span class="tb-prog-label" id="tbProgLabel"></span>
  </div>
  <div class="dday" id="ddayBadge">2차 시험 D-—</div>
  <button class="btn btn-icon" id="syncBtn" data-tooltip="동기화 상태" style="color:#81C995;pointer-events:none"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M6.657 18c-2.572 0 -4.657 -2.007 -4.657 -4.483c0 -2.475 2.085 -4.482 4.657 -4.482c.393 -1.762 1.794 -3.2 3.675 -3.773c1.88 -.572 3.956 -.193 5.444 1c1.488 1.19 2.162 3.007 1.77 4.769h.99c1.913 0 3.464 1.56 3.464 3.486c0 1.927 -1.551 3.487 -3.465 3.487h-11.878"/><path d="M9 12l2 2l4 -4"/></svg></button>
</div>

<div id="statsPanel" class="stats-strip">
  <div class="stats-strip-head" id="statsHdr" style="cursor:pointer">
    <span class="stats-strip-title">목표 &amp; 통계</span>
    <textarea class="stats-resolution-inline" id="statsResolutionInline" rows="1" placeholder="다짐을 입력하세요..."></textarea>
    <button class="btn btn-icon" id="statsCollapseBtn" style="margin-left:auto;font-size:11px;padding:2px 6px;line-height:1.4;flex-shrink:0">▼</button>
  </div>
  <div class="stats-body" id="statsBody"></div>
</div>

<div class="planner-wrapper" id="plannerWrapper">
  <div class="planner-grid">
    <div class="time-col">
      <div class="time-header-spacer"><button class="goal-collapse-btn" id="goalCollapseBtn" title="목표 접기/펼치기">▼</button></div>
      <div class="time-goal-spacer"></div>
      <div class="time-labels-wrap" id="timeLabels"></div>
    </div>
    <div class="days-area" id="daysArea"></div>
  </div>
</div>

<div class="daily-summary u-hidden" id="dailySummary"></div>

<div class="retro-panel u-hidden" id="dailyRetro">
  <div class="retro-body" id="dailyRetroBody"></div>
</div>

<div class="retro-panel collapsed u-hidden" id="weeklyRetro">
  <div class="retro-header" id="weeklyRetroHdr">
    <span class="retro-title">주간 회고</span>
    <button class="retro-toggle-btn" id="weeklyRetroToggle">펼치기 ▼</button>
  </div>
  <div class="retro-body" id="weeklyRetroBody"></div>
</div>

<div class="dday-grid u-hidden" id="ddayGrid">
  <div class="dday-grid-hdr" id="ddayGridHdr"></div>
  <div class="dday-squares" id="ddaySquares"></div>
</div>

<div class="month-wrap u-hidden" id="monthWrap"></div>

<div class="review-wrap u-hidden" id="reviewWrap">
  <div class="review-sub-tabs" id="reviewSubTabs"></div>
  <div class="review-date-nav" id="reviewDateNav" style="display:none"></div>
  <div class="review-banner" id="reviewBanner">
    <span class="review-banner-msg"></span>
    <button class="review-banner-edit" id="reviewBannerEdit">수정</button>
    <button class="review-banner-close" id="reviewBannerClose">✕</button>
  </div>
  <div id="reviewContent"></div>
</div>
<div id="reviewToast"></div>

<div class="review-modal-overlay" id="reviewModalOverlay">
  <div class="review-edit-sheet">
    <div class="review-edit-title" id="reviewEditTitle">회독 설정</div>
    <div class="review-edit-sheet-body">
      <div class="review-edit-field">
        <label class="review-edit-label">기간</label>
        <div class="review-stepper">
          <button class="review-stepper-btn" id="rsDaysMinus">−</button>
          <span class="review-stepper-val" id="rsDaysVal">7</span>
          <button class="review-stepper-btn" id="rsDaysPlus">+</button>
          <span style="font-size:12px;color:#9B9A97">일</span>
          <span class="rs-total-sep">·</span>
          <span style="font-size:12px;color:#9B9A97">총</span>
          <input type="number" id="rsTotalCount" class="rs-total-inp" min="1" placeholder="—">
          <span style="font-size:12px;color:#9B9A97">개</span>
          <button type="button" class="rs-auto-dist-btn" id="rsAutoDistBtn">자동 배분</button>
        </div>
      </div>
      <div class="review-edit-field">
        <label class="review-edit-label">시작일</label>
        <input type="date" class="review-date-input" id="rsStartDate">
        <label class="review-auto-label"><input type="checkbox" id="rsAutoDate"> 이전 회독 종료 다음날로 자동 설정</label>
        <label class="review-auto-label" style="margin-top:6px"><input type="checkbox" id="rsWeekdayOnly"> 주말(토/일) 제외 — 평일만 카운트</label>
      </div>
      <div class="review-suggestion" id="rsSuggestion"></div>
      <div class="review-edit-field" id="rsContentField" style="display:none">
        <label class="review-edit-label">일별 내용</label>
        <div class="rs-content-section" id="rsContentSection"></div>
      </div>
      <div class="review-edit-field" id="rsBlocksField" style="display:none">
        <label class="review-edit-label">회독 단위 목록</label>
        <div id="rsBlocksSection"></div>
        <button type="button" class="rs-block-add-btn" id="rsBlockAdd">+ 단위 추가</button>
      </div>
    </div>
    <div class="review-edit-actions">
      <button class="btn" id="rsCancel">취소</button>
      <button class="btn-primary" id="rsSave">저장</button>
    </div>
  </div>
</div>


<div class="tmpl-panel collapsed" id="tmplPanel">
  <div class="tmpl-hdr" id="tmplHdr">반복 템플릿 <span class="tmpl-toggle" id="tmplToggle">펼치기 ▼</span></div>
  <div class="tmpl-body" id="tmplBody"></div>
</div>

<div class="ctx-menu" id="ctxMenu"></div>

<div class="modal-overlay" id="repeatModalOverlay">
  <div class="modal-box">
    <h3>요일 반복 설정</h3>
    <div class="field">
      <label>요일</label>
      <div class="repeat-day-chips">
        <button type="button" class="repeat-day-chip" data-rday="0">월</button>
        <button type="button" class="repeat-day-chip" data-rday="1">화</button>
        <button type="button" class="repeat-day-chip" data-rday="2">수</button>
        <button type="button" class="repeat-day-chip" data-rday="3">목</button>
        <button type="button" class="repeat-day-chip" data-rday="4">금</button>
        <button type="button" class="repeat-day-chip" data-rday="5">토</button>
        <button type="button" class="repeat-day-chip" data-rday="6">일</button>
      </div>
      <div class="repeat-quick-btns">
        <button type="button" id="repeatQuickWeekday">평일</button>
        <button type="button" id="repeatQuickEvery">매일</button>
      </div>
    </div>
    <div class="field">
      <label>기간</label>
      <div class="repeat-period-opts">
        <label class="repeat-period-opt"><input type="radio" name="rperiod" value="thisweek" checked> 이번 주만</label>
        <label class="repeat-period-opt"><input type="radio" name="rperiod" value="nextweek"> 다음 주까지</label>
        <label class="repeat-period-opt"><input type="radio" name="rperiod" value="exam"> 시험일까지 (2026-08-30)</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" id="repeatCancel">취소</button>
      <button class="btn-primary" id="repeatApply">적용</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3>블록 편집</h3>
    <div class="field">
      <label>과목</label>
      <select id="editSubject">
        <option value="labor_law">노동법</option>
        <option value="hr_mgmt">인사노무관리</option>
        <option value="admin_law">행정쟁송법</option>
        <option value="labor_econ">노동경제학</option>
        <option value="precedent">판례암기+타이핑</option>
        <option value="rest">휴식 / 식사 / 산책</option>
      </select>
    </div>
    <div class="field">
      <label>범위</label>
      <textarea id="editMemo" placeholder="학습 범위 (예: 민법 §103–§110)..." style="min-height:48px"></textarea>
    </div>
    <div class="field">
      <label>메모</label>
      <textarea id="editNote" placeholder="추가 메모, 참고사항..."></textarea>
    </div>
    <div class="field">
      <label>일간 목표 <span id="editGoalsDayLabel" style="font-weight:400;text-transform:none;letter-spacing:0"></span></label>
      <div id="editGoalsList"></div>
      <button type="button" class="edit-goals-add" id="editGoalsAdd">+ 목표 추가</button>
    </div>
    <div class="modal-actions">
      <button class="btn" id="modalCancel">취소</button>
      <button class="btn-primary" id="modalSave">저장</button>
    </div>
  </div>
</div>

<div class="retro-popup-overlay" id="retroPopupOverlay">
  <div class="retro-popup">
    <div class="retro-popup-hdr">
      <span class="retro-popup-title" id="retroPopupTitle">주간 회고</span>
      <button class="retro-popup-close" id="retroPopupClose">×</button>
    </div>
    <div id="retroPopupBody"></div>
    <div class="retro-popup-footer">
      <button class="btn" id="retroPopupDismiss">닫기</button>
      <button class="btn-primary" id="retroPopupSave">저장하고 닫기</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="stats.js"></script>
<script src="view-weekly.js"></script>
<script src="view-daily.js"></script>
<script src="view-monthly.js"></script>
<script src="view-review.js"></script>
</body>
</html>
