// РћђРћђ weekday repeat РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
let _repeatBlkId=null;
function openRepeatModal(blkId){
  _repeatBlkId=blkId;
  const blk=getBlock(blkId);if(!blk)return;
  document.querySelectorAll('.repeat-day-chip').forEach(chip=>{
    chip.classList.toggle('on',parseInt(chip.dataset.rday)===blk.day);
  });
  document.querySelector('input[name="rperiod"][value="thisweek"]').checked=true;
  document.getElementById('repeatModalOverlay').classList.add('open');
}
function closeRepeatModal(){
  document.getElementById('repeatModalOverlay').classList.remove('open');
  _repeatBlkId=null;
}
document.getElementById('repeatCancel').onclick=closeRepeatModal;
document.getElementById('repeatModalOverlay').onclick=e=>{if(e.target===document.getElementById('repeatModalOverlay'))closeRepeatModal();};
document.querySelectorAll('.repeat-day-chip').forEach(chip=>{
  chip.addEventListener('click',()=>chip.classList.toggle('on'));
});
document.getElementById('repeatApply').onclick=()=>{
  const blk=getBlock(_repeatBlkId);if(!blk)return;
  const selDays=[...document.querySelectorAll('.repeat-day-chip.on')].map(c=>parseInt(c.dataset.rday));
  if(!selDays.length){alert('ВџћВЮ╝ВЮё ьЋўвѓў ВЮ┤ВЃЂ ВёаьЃЮьЋўВёИВџћ.');return;}
  const period=document.querySelector('input[name="rperiod"]:checked').value;
  const EXAM=new Date(2026,7,30);EXAM.setHours(0,0,0,0);
  const weeks=[new Date(currentMonday)];
  if(period!=='thisweek'){
    let w=addDays(currentMonday,7);
    while(period==='exam'?w<=EXAM:weeks.length<2){weeks.push(new Date(w));w=addDays(w,7);}
  }
  pushUndo();
  blk.repeat=true;
  let created=0;
  weeks.forEach(wMon=>{
    const wk=weekKey(wMon);
    const isCur=weekKey(currentMonday)===wk;
    const wb=isCur?blocks:loadWeek(wMon);
    let changed=isCur;
    selDays.forEach(day=>{
      if(isCur&&day===blk.day)return;
      if(wb.some(b=>b.day===day&&!b.ghost&&b.startMin<blk.endMin&&b.endMin>blk.startMin))return;
      wb.push({id:uid(),day,startMin:blk.startMin,endMin:blk.endMin,subject:blk.subject,memo:blk.memo||'',note:blk.note||'',completed:false,repeat:true});
      created++;changed=true;
    });
    if(changed){
      if(isCur)saveWeek();
      else{const v=JSON.stringify(wb);localStorage.setItem(wk,v);syncToSupabase(wk,v);}
    }
  });
  renderBlocks();
  closeRepeatModal();
  showPlannerToast(`РюЊ ${created}Ж░ю вИћвАЮВЮ┤ ВЃЮВё▒вљўВЌѕВіхвІѕвІц`);
};
function showPlannerToast(msg){
  let t=document.getElementById('plannerToast');
  if(!t){t=document.createElement('div');t.id='plannerToast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#37352F;color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity='0',2500);
}

// РћђРћђ auto-goal from block РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
function autoGoalFromBlock(blk){
  const short=SUBJ_SHORT[blk.subject];
  if(!short)return;
  const date=addDays(currentMonday,blk.day);
  const dk=dateKey(date);
  const text=blk.memo?`${short} ${blk.memo}`:short;
  let gs=loadDailyGoals(dk);
  const existing=gs.find(g=>g.blkId===blk.id);
  if(existing){existing.text=text;}
  else{gs.push({id:uid(),text,status:'',done:false,blkId:blk.id});}
  saveDailyGoals(dk,gs);
  const rowEl=document.querySelector(`.daily-goal-row[data-day="${blk.day}"]`);
  if(rowEl){buildGoalRowContent(rowEl,dk);syncGoalRowHeight();}
}

function removeGoalForBlock(blk){
  if(!blk)return;
  const date=addDays(currentMonday,blk.day);
  const dk=dateKey(date);
  let gs=loadDailyGoals(dk);
  const before=gs.length;
  gs=gs.filter(g=>g.blkId!==blk.id);
  if(gs.length<before){
    saveDailyGoals(dk,gs);
    const rowEl=document.querySelector(`.daily-goal-row[data-day="${blk.day}"]`);
    if(rowEl){buildGoalRowContent(rowEl,dk);syncGoalRowHeight();}
  }
}

function isTypingContext(){const el=document.activeElement;return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.contentEditable==='true');}

document.addEventListener('keydown',e=>{
  if(document.getElementById('repeatModalOverlay').classList.contains('open')){if(e.key==='Escape')closeRepeatModal();return;}
  if(document.getElementById('modalOverlay').classList.contains('open')){if(e.key==='Escape')closeModal();return;}
  const meta=e.metaKey||e.ctrlKey;
  if(meta&&e.key==='c'&&selectedIds.size>0&&!isTypingContext()){e.preventDefault();clipboard=blocks.filter(b=>selectedIds.has(b.id)).map(b=>({...b}));return;}
  if(meta&&e.key==='v'&&clipboard.length>0&&!isTypingContext()){
    e.preventDefault();pushUndo();clearSelection();
    const nb=clipboard.map(b=>{
      const dur=b.endMin-b.startMin;const ns=Math.min(b.startMin+30,END_M-Math.max(dur,gran));const ne=Math.min(ns+dur,END_M);const id=uid();selectedIds.add(id);
      return{...b,id,startMin:ns,endMin:ne,completed:false};
    });
    blocks.push(...nb);saveWeek();renderBlocks();return;
  }
  if(meta&&e.key==='z'&&!e.shiftKey&&!isTypingContext()){e.preventDefault();undo();return;}
  if(meta&&(e.key==='y'||(e.key==='z'&&e.shiftKey))&&!isTypingContext()){e.preventDefault();redo();return;}
  if((e.key==='Escape'||e.key==='Delete')&&selectedIds.size>0&&!isTypingContext()){e.preventDefault();deleteSelected();return;}
  if(e.key==='Escape')hideCtx();
});

function retroStorageKey(type,d){
  if(type==='day')return `retro_${dateKey(d)}`;
  if(type==='week')return `retro_week_${weekKey(getMondayOf(d))}`;
  if(type==='month')return `retro_month_${monthStorageKey(d)}`;
}
function loadRetro(type,d){try{return JSON.parse(localStorage.getItem(retroStorageKey(type,d))||'null')||{};}catch{return {};}}
function saveRetro(type,d,data){const k=retroStorageKey(type,d);const v=JSON.stringify(data);localStorage.setItem(k,v);syncToSupabase(k,v);}

function makeStars(val,cb,cls='retro-star',max=5){
  let html='<div class="retro-stars">';
  for(let i=1;i<=max;i++)html+=`<button class="${cls}${i<=val?' active':''}" data-star="${i}">РўЁ</button>`;
  html+='</div>';
  const wrap=document.createElement('div');wrap.innerHTML=html;
  const starsEl=wrap.firstElementChild;
  starsEl.addEventListener('click',e=>{
    const btn=e.target.closest('[data-star]');if(!btn)return;
    const v=parseInt(btn.dataset.star);cb(v);
    starsEl.querySelectorAll('[data-star]').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.star)<=v));
  });
  return starsEl;
}

// РћђРћђ mobile touch РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
let touchState=null;
let longPressTimer=null;

function showMobileCtx(blockId,x,y){
  const blk=getBlock(blockId);if(!blk)return;
  const menu=document.getElementById('ctxMenu');
  menu.innerHTML=
    (()=>{const st=blk.status||(blk.completed?'done':'');const lbl=st===''?'ВЎёвБївАю ьЉюВІю':st==='done'?'ВІцьїевАю ьЉюВІю':'в»ИВЎёвБївАю ьЉюВІю';return`<button class="ctx-item" data-action="toggle" data-id="${blk.id}">${lbl}</button>`;})()+
    `<button class="ctx-item" data-action="edit" data-id="${blk.id}">вЕћвфе ьјИВДЉ</button>`+
    `<div class="ctx-divider"></div>`+
    `<button class="ctx-item danger" data-action="delete" data-id="${blk.id}">ВѓГВаю</button>`;
  menu.style.display='block';
  menu.style.left=Math.min(x,window.innerWidth-190)+'px';
  menu.style.top=Math.min(y,window.innerHeight-140)+'px';
  menu.onclick=ev=>{
    const btn=ev.target.closest('[data-action]');if(!btn)return;
    const id=btn.dataset.id;const b=getBlock(id);
    if(btn.dataset.action==='toggle'){if(b){pushUndo();const cur=b.status||(b.completed?'done':'');b.status=cur===''?'done':cur==='done'?'fail':'';b.completed=(b.status==='done');saveWeek();renderBlocks();}}
    else if(btn.dataset.action==='edit'){openEditModal(id);}
    else if(btn.dataset.action==='delete'){if(b){pushUndo();removeGoalForBlock(b);blocks=blocks.filter(x=>x.id!==id);selectedIds.delete(id);saveWeek();renderBlocks();}}
    hideCtx();
  };
}

function onTouchStart(e){
  if(!isMobile())return;
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  const t=e.touches[0];
  const tx=t.clientX,ty=t.clientY;
  touchState={x:tx,y:ty,t:Date.now(),moved:false};
  // long press on a block (not on a button) Рєњ context menu
  const blkEl=findBlockEl(e.target);
  if(blkEl&&!e.target.closest('.block-done-btn')&&!e.target.closest('.block-focus-btn')){
    const id=blkEl.dataset.id;
    longPressTimer=setTimeout(()=>{
      longPressTimer=null;touchState=null;
      showMobileCtx(id,tx,ty);
    },500);
  }
}

function onTouchMove(e){
  if(!isMobile()||!touchState)return;
  const t=e.touches[0];
  const dx=t.clientX-touchState.x,dy=t.clientY-touchState.y;
  if(Math.abs(dx)>8||Math.abs(dy)>8){
    touchState.moved=true;
    if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  }
}

function onTouchEnd(e){
  if(!isMobile())return;
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  if(!touchState)return;
  const t=e.changedTouches[0];
  const dx=t.clientX-touchState.x;
  const dy=t.clientY-touchState.y;
  const dt=Date.now()-touchState.t;
  const moved=touchState.moved;
  touchState=null;

  // horizontal swipe Рєњ navigate day
  if(Math.abs(dx)>60&&Math.abs(dy)<80&&dt<600){
    if(viewMode==='day'){
      currentDay=addDays(currentDay,dx<0?1:-1);
      currentMonday=getMondayOf(currentDay);
      blocks=loadWeek(currentMonday);
      renderDailyView();
    }
    return;
  }

  // tap on block (not a button, not a swipe) Рєњ select
  if(!moved&&dt<400){
    const blkEl=findBlockEl(e.target);
    if(blkEl&&!e.target.closest('.block-done-btn')&&!e.target.closest('.block-focus-btn')){
      const id=blkEl.dataset.id;
      if(selectedIds.has(id)){clearSelection();}
      else{clearSelection();selectedIds.add(id);blkEl.classList.add('selected');}
    } else if(!blkEl){
      clearSelection();
    }
  }
}

// РћђРћђ mobile touch resize РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
let touchResizeState=null;

function onResizeHandleTouchStart(e){
  if(!isMobile())return;
  const handle=e.target.closest('[data-rdir]');
  if(!handle)return;
  const dir=handle.dataset.rdir;
  if(dir!=='s'&&dir!=='n')return;
  const id=handle.dataset.rid;
  const blk=getBlock(id);if(!blk)return;
  e.preventDefault();e.stopPropagation();
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  touchState=null;
  const ty=e.touches[0].clientY;
  touchResizeState={dir,id};
  document.addEventListener('touchmove',onResizeTouchMove,{passive:false});
  document.addEventListener('touchend',onResizeTouchEnd);
}

function onResizeTouchMove(e){
  if(!touchResizeState)return;
  e.preventDefault();
  const{dir,id}=touchResizeState;
  const blk=getBlock(id);if(!blk)return;
  const ty=e.touches[0].clientY;
  const body=document.querySelector(`.day-body[data-day="${blk.day}"]`);if(!body)return;
  const el=document.querySelector(`.block[data-id="${id}"]`);if(!el)return;
  if(dir==='s'){
    blk.endMin=Math.max(clampMin(snapMin(yToMin(bodyY(body,ty)))),blk.startMin+gran);
    el.style.height=Math.max((blk.endMin-blk.startMin)*ppm(),14)+'px';
    const lbl=el.querySelector('.block-time-label');if(lbl)lbl.textContent=`${fmtTime(blk.startMin)}РђЊ${fmtTime(blk.endMin)}`;
  } else {
    const ns=Math.min(clampMin(snapMin(yToMin(bodyY(body,ty)))),blk.endMin-gran);
    blk.startMin=ns;
    el.style.top=minToY(blk.startMin)+'px';
    el.style.height=Math.max((blk.endMin-blk.startMin)*ppm(),14)+'px';
    const lbl=el.querySelector('.block-time-label');if(lbl)lbl.textContent=`${fmtTime(blk.startMin)}РђЊ${fmtTime(blk.endMin)}`;
  }
}

function onResizeTouchEnd(){
  if(!touchResizeState)return;
  document.removeEventListener('touchmove',onResizeTouchMove);
  document.removeEventListener('touchend',onResizeTouchEnd);
  pushUndo();saveWeek();renderBlocks();
  touchResizeState=null;
}

function getCalendarEndForCycle(c){
  if(!c||!c.startDate)return null;
  const start=new Date(c.startDate);start.setHours(0,0,0,0);
  if(!c.weekdayOnly)return addDays(start,c.days);
  let d=new Date(start);let count=0;
  while(count<c.days){const dow=d.getDay();if(dow!==0&&dow!==6)count++;if(count<c.days)d=addDays(d,1);}
  return addDays(d,1);
}
function getCycleDayIn(c,date){
  if(!c||!c.startDate)return 0;
  const start=new Date(c.startDate);start.setHours(0,0,0,0);
  if(!c.weekdayOnly)return Math.max(0,Math.floor((date-start)/86400000));
  let d=new Date(date);d.setHours(0,0,0,0);
  while(d.getDay()===0||d.getDay()===6)d=addDays(d,-1);
  if(d<start)return 0;
  let count=0;let cur=new Date(start);
  while(cur<d){const dow=cur.getDay();if(dow!==0&&dow!==6)count++;cur=addDays(cur,1);}
  return count;
}
function getCycleDayCalDate(c,dayIndex){
  if(!c||!c.startDate)return null;
  const start=new Date(c.startDate);start.setHours(0,0,0,0);
  if(!c.weekdayOnly)return addDays(start,dayIndex);
  let d=new Date(start);let cnt=0;
  while(cnt<dayIndex){d=addDays(d,1);if(d.getDay()!==0&&d.getDay()!==6)cnt++;}
  return d;
}
function getCycleStatus(c,today){
  if(!c.startDate)return 'future';
  const start=new Date(c.startDate);start.setHours(0,0,0,0);
  const end=getCalendarEndForCycle(c);
  if(today>=end)return 'done';
  if(today>=start)return 'current';
  return 'future';
}

function getTodayBlockIndices(dayInCycle,blocksPerDay,numBlocks){
  if(!blocksPerDay||blocksPerDay<=0)return[];
  const s=Math.floor(dayInCycle*blocksPerDay);
  const e=Math.floor((dayInCycle+1)*blocksPerDay);
  const r=[];
  for(let i=s;i<Math.min(e,numBlocks);i++)r.push(i);
  return r;
}

function addReviewCycle(sk){
  const d=loadReviewData(sk)||{blocks:Array.from({length:8},(_,i)=>({id:'b'+(i+1),name:'вИћвАЮ '+(i+1)})),cycles:[]};
  const next=(d.cycles.length?d.cycles[d.cycles.length-1].num:0)+1;

  saveReviewData(sk,d);renderReview();
}

function openReviewEditModal(sk,cycleNum,cycles){
  _rsSubjectKey=sk;_rsCycleNum=cycleNum;
  const d=loadReviewData(sk);
  const c=d&&cycleNum?d.cycles.find(x=>x.num===cycleNum):null;
  document.getElementById('reviewEditTitle').textContent=cycleNum?`${cycleNum}ьџївЈЁ ВёцВаЋ`:'ьџївЈЁ ВёцВаЋ';
  document.getElementById('rsDaysVal').textContent=c?c.days:7;
  document.getElementById('rsStartDate').value=c&&c.startDate?c.startDate:'';
  const prev=cycles&&cycleNum>1?cycles.find(x=>x.num===cycleNum-1):null;
  const prevEndDate=prev&&prev.startDate?dateKey(addDays(new Date(prev.startDate),prev.days)):'';
  document.getElementById('rsAutoDate').checked=false;
  document.getElementById('rsAutoDate').dataset.prevend=prevEndDate;
  document.getElementById('rsWeekdayOnly').checked=!!(c&&c.weekdayOnly);
  const rec=cycleNum>1?`ВХћВ▓ю: ${cycleNum}ьџївЈЁВЮђ ВЮ┤Ваё ьџївЈЁ вїђв╣ё ~20% вІеВХЋ ЖХїВъЦ`:'';
  document.getElementById('rsSuggestion').textContent=rec;
  document.getElementById('reviewModalOverlay').classList.add('open');
}

function closeReviewModal(){
  document.getElementById('reviewModalOverlay').classList.remove('open');
  _rsSubjectKey=null;_rsCycleNum=null;
}

function loadReviewWeaks(sk){try{return JSON.parse(localStorage.getItem('review_weak_'+sk)||'{}')}catch{return{}}}
function saveReviewWeaks(sk,d){const key='review_weak_'+sk;const v=JSON.stringify(d);localStorage.setItem(key,v);syncToSupabase(key,v);}
function loadReviewMemo(sk,blockId){try{return localStorage.getItem('review_memo_'+sk+'_'+blockId)||''}catch{return''}}
function saveReviewMemo(sk,blockId,text){const key='review_memo_'+sk+'_'+blockId;localStorage.setItem(key,text);syncToSupabase(key,text);}

function showReviewToast(msg){
  const t=document.getElementById('reviewToast');if(!t)return;
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._hide);t._hide=setTimeout(()=>t.style.opacity='0',2000);
}

function getCompletedDaysInCycle(sk,cur,data){
  if(!cur||!cur.startDate||!data)return 0;
  const s=new Date(cur.startDate);s.setHours(0,0,0,0);
  const today=new Date();today.setHours(0,0,0,0);
  const nb=data.blocks.length;
  let count=0,d=0;
  let calDate=new Date(s);
  while(d<cur.days){
    if(calDate>=today)break;
    const dow=calDate.getDay();
    if(!cur.weekdayOnly||dow!==0&&dow!==6){
      const ch=loadReviewChecks(sk,calDate);
      let ids=[];
      if(cur.dailyPlan){ids=cur.dailyPlan.filter(p=>p.day===d).map(()=>'dp_'+d);}
      else if(cur.blocksPerDay){ids=getTodayBlockIndices(d,cur.blocksPerDay,nb).map(i=>data.blocks[i]?.id).filter(Boolean);}
      if(ids.length&&ids.every(id=>ch[id]))count++;
      d++;
    }
    calDate=addDays(calDate,1);
  }
  return count;
}

function tryAutoNextCycle(sk,data){
  const today=new Date();today.setHours(0,0,0,0);
  const cur=data.cycles.find(c=>getCycleStatus(c,today)==='current');
  if(!cur)return;
  if(cur.weekdayOnly&&(today.getDay()===0||today.getDay()===6))return;
  const dayIn=getCycleDayIn(cur,today);
  if(dayIn!==cur.days-1)return;
  const checks=loadReviewChecks(sk);
  let todayIds=[];
  if(cur.dailyPlan){
    todayIds=cur.dailyPlan.filter(p=>p.day===dayIn).map(()=>'dp_'+dayIn);
  }else if(cur.blocksPerDay){
    todayIds=getTodayBlockIndices(dayIn,cur.blocksPerDay,data.blocks.length).map(i=>data.blocks[i].id);
  }
  if(!todayIds.length||!todayIds.every(id=>checks[id]))return;
  let next=data.cycles.find(c=>c.num===cur.num+1);
  if(!next){
    const newDays=Math.max(1,Math.round(cur.days*0.8));
    next={num:cur.num+1,days:newDays,blocksPerDay:cur.blocksPerDay||1,startDate:null};
    data.cycles.push(next);
  }
  if(next.startDate)return;
  const _calEnd=getCalendarEndForCycle(cur);
  next.startDate=dateKey(_calEnd||addDays(new Date(cur.startDate),cur.days));
  saveReviewData(sk,data);
  showReviewToast(`${cur.label||cur.num+'ьџївЈЁ'} ВЎёвБї!`);
  const banner=document.getElementById('reviewBanner');
  if(banner){
    const msg=banner.querySelector('.review-banner-msg');
    if(msg)msg.textContent=`${cur.label||cur.num+'ьџївЈЁ'} ВЎёвБї! ${next.label||next.num+'ьџївЈЁ'}ВЮ┤ ВъљвЈЎ ВёцВаЋвљўВЌѕВіхвІѕвІц.`;
    const editBtn=document.getElementById('reviewBannerEdit');
    if(editBtn){editBtn.dataset.rsk=sk;editBtn.dataset.rnum=next.num;}
    banner.classList.add('open');
  }
}

function addBlockFromReview(sk,bname,hour,dur,targetDate){
  const td=targetDate?new Date(targetDate):new Date();td.setHours(0,0,0,0);
  const dk=dateKey(td);

  }

function getTodayMemoForSubject(sk,tgt){
  const data=loadReviewData(sk);if(!data)return'';
  const refDate=tgt?new Date(tgt):(()=>{const d=new Date();d.setHours(0,0,0,0);return d;})();
  refDate.setHours(0,0,0,0);
  let cur=null,dayIn=0;
  (data.cycles||[]).forEach(c=>{
    if(getCycleStatus(c,refDate)==='current'&&!cur){
      cur=c;const s=new Date(c.startDate);s.setHours(0,0,0,0);
      dayIn=Math.floor((refDate-s)/86400000);
    }
  });
  if(!cur)return'';
  const cn=cur.label||(cur.num+'ьџївЈЁ');
  const items=[];
  if(cur.dailyPlan){
    cur.dailyPlan.filter(p=>p.day===dayIn).forEach(p=>{
      const blk=data.blocks[p.blockIdx];if(!blk)return;
      items.push(cn+' '+(p.text||blk.name));
    });
  }else if(cur.blocksPerDay){
    getTodayBlockIndices(dayIn,cur.blocksPerDay,data.blocks.length).forEach(bi=>{
      const blk=data.blocks[bi];if(!blk)return;
      items.push(cn+' '+blk.name);
    });
  }
  return items.join(' / ');
}

function addTodaySchedule(btn,targetDate,stateKey){
  const realToday=new Date();realToday.setHours(0,0,0,0);

  const todayDi=dayIdx(tgt);

  let todayBlocks=isCurrentWeek?[...blocks]:loadWeek(todayMon);

  const m={
    labor_law: getTodayMemoForSubject('labor_law',tgt)||'вЁИвЈЎв▓Ћ',

    labor_econ:getTodayMemoForSubject('labor_econ',tgt)||'вЁИвЈЎЖ▓йВаюьЋЎ',
  };

  const studySlots=[
    {subject:'labor_law', startMin:480, endMin:660, memo:m.labor_law},
    {subject:'admin_law', startMin:660, endMin:720, memo:m.admin_law},
    {subject:'admin_law', startMin:780, endMin:900, memo:m.admin_law},
    {subject:'hr_mgmt',   startMin:900, endMin:1080,memo:m.hr_mgmt},
    {subject:'labor_econ',startMin:1200,endMin:1380,memo:m.labor_econ},
  ];
  const restSlots=[
    {subject:'rest',startMin:720,endMin:780,memo:'ВаљВІг'},
    {subject:'rest',startMin:1080,endMin:1140,memo:'ВађвЁЂ'},
    {subject:'rest',startMin:1140,endMin:1200,memo:'Вюевг┤ Вѓ░В▒Ё'},
  ];

  const hasConflict=studySlots.some(slot=>
    todayBlocks.some(b=>b.day===todayDi&&!b.ghost&&b.startMin<slot.endMin&&b.endMin>slot.startMin)
  );

  if(hasConflict){
    if(!confirm('ВЮ┤в»И ьЋ┤вІ╣ ВІюЖ░ёВЌљ вИћвАЮВЮ┤ ВъѕВіхвІѕвІц. вЇ«Вќ┤ВЊИЖ╣їВџћ?'))return;
    const toRemove=new Set();
    studySlots.forEach(slot=>{
      todayBlocks.forEach(b=>{
        if(b.day===todayDi&&!b.ghost&&b.startMin<slot.endMin&&b.endMin>slot.startMin)toRemove.add(b.id);
      });
    });
    todayBlocks=todayBlocks.filter(b=>!toRemove.has(b.id));
  }

  pushUndo();
  studySlots.forEach(slot=>{
    todayBlocks.push({id:uid(),day:todayDi,startMin:slot.startMin,endMin:slot.endMin,subject:slot.subject,memo:slot.memo,note:'',completed:false});
  });
  restSlots.forEach(slot=>{
    const exists=todayBlocks.some(b=>b.day===todayDi&&!b.ghost&&b.startMin<slot.endMin&&b.endMin>slot.startMin);
    if(!exists)todayBlocks.push({id:uid(),day:todayDi,startMin:slot.startMin,endMin:slot.endMin,subject:slot.subject,memo:slot.memo,note:'',completed:false});
  });

  if(isCurrentWeek){blocks=todayBlocks;saveWeek();}
  else{const v=JSON.stringify(todayBlocks);localStorage.setItem(todayWKey,v);syncToSupabase(todayWKey,v);}

  if(stateKey)_schedAddedDates[stateKey]=true;
  btn.textContent='РюЊ ВХћЖ░ђвље';
  btn.style.cssText+='background:#9B9A97;color:#fff;border-color:#9B9A97;cursor:default;';

  const isToday=isSameDay(tgt,realToday);
  showReviewToast(isToday?'Вўцвіў ВІюЖ░ёьЉюВЌљ ВХћЖ░ђвље!':`${tgt.getMonth()+1}ВЏћ${tgt.getDate()}ВЮ╝ ВІюЖ░ёьЉюВЌљ ВХћЖ░ђвље!`);
}

    const toRemove=new Set();

  navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.update());});
  if('caches' in window){caches.keys().then(ns=>ns.forEach(n=>caches.delete(n)));}
